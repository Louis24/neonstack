        .time-box {

        }

            opacity: 0.9;

        .region-grid {
            display: grid;

            gap: 1rem;
            margin-top: 1.5rem;
        }
        .region-card {
            background: var(--panel-strong);
            padding: 1.5rem;
            border-radius: 12px;
            border-left: 4px solid var(--accent-color);
        }
        .region-name {
            font-weight: 700;
            font-size: 1.1rem;

        }

<body>
    <header class="header">
        <div class="container navbar">
            <a href="../../" class="logo">Game<span>Launch</span></a>
            <nav class="nav-links" aria-label="Primary navigation">
                <a href="../../#tools">Tools</a>
                <a href="../../#reviews">Reviews</a>
                <a href="../../#games">Games</a>
                <a href="../../about/">About</a>
            </nav>
        </div>
    </header>

    <main class="container main-content">
        <section class="calculator-card">
            <div class="card-header">
                <h1>🎮 Game Launch Countdown</h1>
                <p>Track game releases across time zones. Never miss a global launch!</p>
            </div>

            <div class="input-group">
                <label>Game Name</label>
                <input type="text" id="game-name" class="input" placeholder="e.g., Elden Ring DLC" value="Upcoming Game Release">
            </div>

            <div class="input-group">
                <label>Launch Date & Time (UTC)</label>
                <input type="datetime-local" id="launch-time" class="input" onchange="updateCountdown()">
            </div>

            <div class="countdown-display" id="countdown-display">
                <div class="game-title" id="display-game-name">Select a launch date</div>
                <div class="time-grid">
                    <div class="time-box">
                        <div class="time-value" id="days">-</div>
                        <div class="time-label">Days</div>
                    </div>
                    <div class="time-box">
                        <div class="time-value" id="hours">-</div>
                        <div class="time-label">Hours</div>
                    </div>
                    <div class="time-box">
                        <div class="time-value" id="minutes">-</div>
                        <div class="time-label">Minutes</div>
                    </div>
                    <div class="time-box">
                        <div class="time-value" id="seconds">-</div>
                        <div class="time-label">Seconds</div>
                    </div>
                </div>
            </div>

            <div class="input-group">
                <label>🌍 Launch Times by Region</label>
                <div class="region-grid" id="region-times"></div>
            </div>

            <div class="input-group">
                <label>📅 Preset Popular Releases</label>
                <select class="input" onchange="loadPreset(this.value)">
                    <option value="">Select a game...</option>
                    <option value="gta6">GTA VI (2025)</option>
                    <option value="hollow">Hollow Knight: Silksong (TBA)</option>
                    <option value="custom">Custom Date</option>
                </select>
            </div>
        </section>
    </main>

        </div>

    <script>
        const regions = [
            { name: 'Los Angeles (PST)', offset: -8 },
            { name: 'New York (EST)', offset: -5 },
            { name: 'London (GMT)', offset: 0 },
            { name: 'Paris (CET)', offset: 1 },
            { name: 'Tokyo (JST)', offset: 9 },
            { name: 'Sydney (AEDT)', offset: 11 },
            { name: 'Beijing (CST)', offset: 8 },
            { name: 'Seoul (KST)', offset: 9 }
        ];

        let countdownInterval;

        function setDefaultDate() {
            const now = new Date();
            now.setDate(now.getDate() + 7);
            const localDateTime = new Date(now.getTime() - now.getTimezoneOffset() * 60000).toISOString().slice(0, 16);
            document.getElementById('launch-time').value = localDateTime;
        }

        function updateCountdown() {
            clearInterval(countdownInterval);
            
            const gameName = document.getElementById('game-name').value || 'Game Release';
            const launchInput = document.getElementById('launch-time').value;
            
            if (!launchInput) return;

            const launchDate = new Date(launchInput);
            document.getElementById('display-game-name').textContent = gameName;

            countdownInterval = setInterval(() => {
                const now = new Date();
                const diff = launchDate - now;

                if (diff <= 0) {
                    clearInterval(countdownInterval);
                    document.getElementById('days').textContent = '0';
                    document.getElementById('hours').textContent = '0';
                    document.getElementById('minutes').textContent = '0';
                    document.getElementById('seconds').textContent = '0';
                    return;
                }

                const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((diff % (1000 * 60)) / 1000);

                document.getElementById('days').textContent = days;
                document.getElementById('hours').textContent = hours.toString().padStart(2, '0');
                document.getElementById('minutes').textContent = minutes.toString().padStart(2, '0');
                document.getElementById('seconds').textContent = seconds.toString().padStart(2, '0');
            }, 1000);

            updateRegionTimes(launchDate);
        }

        function updateRegionTimes(launchDate) {
            const container = document.getElementById('region-times');
            container.innerHTML = regions.map(region => {
                const regionTime = new Date(launchDate.getTime() + region.offset * 60 * 60 * 1000);
                const timeStr = regionTime.toLocaleString('en-US', {
                    month: 'short',
                    day: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit',
                    hour12: true
                });

                return `
                    <div class="region-card">
                        <div class="region-name">${region.name}</div>
                        <div class="region-time">${timeStr}</div>
                    </div>
                `;
            }).join('');
        }

        function loadPreset(value) {
            if (!value) return;

            const presets = {
                gta6: { name: 'GTA VI', date: '2025-12-01T00:00' },
                hollow: { name: 'Hollow Knight: Silksong', date: '2026-12-31T00:00' }
            };

            if (presets[value]) {
                document.getElementById('game-name').value = presets[value].name;
                document.getElementById('launch-time').value = presets[value].date;
                updateCountdown();
            }
        }

        setDefaultDate();
        updateCountdown();
    </script>
