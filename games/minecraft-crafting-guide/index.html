<body>

    <header class="header">
        <div class="container navbar">
            <a href="../../" class="logo">Mine<span>Craft</span></a>
            <nav class="nav-links" aria-label="Primary navigation">
                <a href="../../#tools">Tools</a>
                <a href="../../#reviews">Reviews</a>
                <a href="../../#games">Games</a>
                <a href="../../about/">About</a>
            </nav>
        </div>
    </header>

    <main class="container main-content">
        <section class="wiki-card">
            <div class="card-header">
                <h1>Interactive Crafting Database</h1>
                <p>Quickly look up item recipes without interrupting your game session.</p>
            </div>

            <!-- Search Area -->
            <div class="search-wrapper">
                <input type="text" id="search-input" placeholder="Search item name (e.g., piston, pickaxe, furnace)...">
            </div>

            <!-- Recipe Grid -->
            <div class="recipes-grid" id="recipes-grid">
                <!-- Dynamically generated recipe cards -->
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container text-center">
            <nav class="footer-links" aria-label="Footer navigation">
                <a href="../../about/">About</a>
                <a href="../../contact/">Contact</a>
                <a href="../../privacy-policy/">Privacy Policy</a>
                <a href="../../disclaimer/">Disclaimer</a>
            </nav>
            <p>&copy; 2026 NeonStack. Browser-first tools and focused guides.</p>
        </div>
    </footer>

    <script>
        const recipes = [
            {
                name: "Piston",
                category: "Mechanism",
                ingredients: ["3x Wood Planks", "4x Cobblestone", "1x Iron Ingot", "1x Redstone Dust"],
                description: "Pushes blocks when powered by redstone.",
                pattern: ["W", "W", "W", "C", "I", "C", "C", "R", "C"] // Simplified grid representation
            },
            {
                name: "Sticky Piston",
                category: "Mechanism",
                ingredients: ["1x Piston", "1x Slimeball"],
                description: "Pushes and pulls blocks when powered.",
                pattern: [" ", "S", " ", " ", "P", " ", " ", " ", " "]
            },
            {
                name: "Iron Pickaxe",
                category: "Tools",
                ingredients: ["3x Iron Ingots", "2x Sticks"],
                description: "Used to mine stone and ore blocks.",
                pattern: ["I", "I", "I", " ", "S", " ", " ", "S", " "]
            },
            {
                name: "Furnace",
                category: "Utility",
                ingredients: ["8x Cobblestone"],
                description: "Smelts ore and cooks food.",
                pattern: ["C", "C", "C", "C", " ", "C", "C", "C", "C"]
            },
            {
                name: "Chest",
                category: "Utility",
                ingredients: ["8x Wood Planks"],
                description: "Stores items and blocks.",
                pattern: ["P", "P", "P", "P", " ", "P", "P", "P", "P"]
            },
            {
                name: "Observer",
                category: "Mechanism",
                ingredients: ["6x Cobblestone", "2x Redstone", "1x Nether Quartz"],
                description: "Detects block updates and outputs redstone pulses.",
                pattern: ["C", "C", "C", "R", "Q", "R", "C", "C", "C"]
            }
        ];

        const searchInput = document.getElementById('search-input');
        const grid = document.getElementById('recipes-grid');

        function renderRecipes(filter = '') {
            grid.innerHTML = '';
            const filtered = recipes.filter(r => r.name.toLowerCase().includes(filter.toLowerCase()));

            if (filtered.length === 0) {
                grid.innerHTML = '<p class="no-results">No crafting recipes found matching that search.</p>';
                return;
            }

            filtered.forEach(r => {
                const card = document.createElement('article');
                card.className = 'recipe-card';
                card.innerHTML = `
                    <div class="card-title-row">
                        <h3>${r.name}</h3>
                        <span class="category-tag">${r.category}</span>
                    </div>
                    <p class="desc">${r.description}</p>
                    <div class="ingredients">
                        <strong>Ingredients:</strong>
                        <ul>
                            ${r.ingredients.map(i => `<li>${i}</li>`).join('')}
                        </ul>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        searchInput.addEventListener('input', (e) => {
            renderRecipes(e.target.value);
        });

        // Initial render
        renderRecipes();
    </script>
</body>
