<body>
    <header class="header">
        <div class="container navbar">
            <a href="../../" class="logo">MH<span>Guide</span></a>
            <nav class="nav-links"><a href="../../#games">Games</a></nav>
        </div>
    </header>

    <main class="container main-content">
        <section class="calculator-card">
            <div class="card-header">
                <h1>🐉 Monster Weakness Guide</h1>
                <p>Quick reference for monster elemental weaknesses in Monster Hunter Rise.</p>
            </div>

            <div class="input-group">
                <input type="text" id="search" placeholder="Search monster..." style="width: 100%; padding: 1rem;" oninput="filterMonsters()">
            </div>

            <div class="monster-grid" id="monster-grid"></div>
        </section>
    </main>

    <footer class="footer">
        <div class="container text-center"><p>&copy; 2026 NeonStack.</p></div>
    </footer>

    <script>
        // Real Monster Hunter Rise data
        const monsters = [
            { name: "Rathalos", primary: "dragon", secondary: "thunder", breakable: "Head, Wings, Back, Tail" },
            { name: "Rathian", primary: "dragon", secondary: "thunder", breakable: "Head, Wings, Back, Tail" },
            { name: "Zinogre", primary: "ice", secondary: "water", breakable: "Head, Back, Forelegs, Tail" },
            { name: "Nargacuga", primary: "thunder", secondary: "fire", breakable: "Head, Wings, Tail" },
            { name: "Tigrex", primary: "thunder", secondary: "dragon", breakable: "Head, Forelegs, Tail" },
            { name: "Diablos", primary: "ice", secondary: "water", breakable: "Head, Wings, Back, Tail" },
            { name: "Anjanath", primary: "water", secondary: "ice", breakable: "Head, Back, Legs, Tail" },
            { name: "Tobi-Kadachi", primary: "water", secondary: "ice", breakable: "Head, Back, Tail" },
            { name: "Mizutsune", primary: "thunder", secondary: "dragon", breakable: "Head, Forelegs, Tail" },
            { name: "Magnamalo", primary: "water", secondary: "dragon", breakable: "Head, Forelegs, Tail" },
            { name: "Goss Harag", primary: "fire", secondary: "thunder", breakable: "Head, Chest, Arms" },
            { name: "Almudron", primary: "fire", secondary: "thunder", breakable: "Head, Back, Tail" },
            { name: "Rakna-Kadaki", primary: "ice", secondary: "water", breakable: "Head, Abdomen, Sac" },
            { name: "Aknosom", primary: "water", secondary: "ice", breakable: "Head, Crest, Wings, Tail" },
            { name: "Tetranadon", primary: "fire", secondary: "ice", breakable: "Head, Belly, Tail" },
            { name: "Bishaten", primary: "fire", secondary: "ice", breakable: "Head, Tail" }
        ];

        function render(filtered = monsters) {
            const grid = document.getElementById('monster-grid');
            grid.innerHTML = '';

            filtered.forEach(monster => {
                const card = document.createElement('div');
                card.className = 'monster-card';
                card.innerHTML = `
                    <h3>${monster.name}</h3>
                    <div class="weakness-row">
                        <span>Primary Weakness:</span>
                        <span class="element ${monster.primary}">${monster.primary.toUpperCase()}</span>
                    </div>
                    <div class="weakness-row">
                        <span>Secondary:</span>
                        <span class="element ${monster.secondary}">${monster.secondary.toUpperCase()}</span>
                    </div>
                    <div style="margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border-color);">
                        <div style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.3rem;">Breakable Parts:</div>
                        <div style="font-size: 0.85rem; color: var(--text-secondary);">${monster.breakable}</div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function filterMonsters() {
            const query = document.getElementById('search').value.toLowerCase();
            const filtered = monsters.filter(m => m.name.toLowerCase().includes(query));
            render(filtered);
        }

        render();
    </script>
