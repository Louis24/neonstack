<body>

        function render() {
            const grid = document.getElementById('art-grid');
            grid.innerHTML = '';

            artworks.forEach(art => {
                const card = document.createElement('div');
                card.className = 'art-card';
                card.setAttribute('data-name', art.name.toLowerCase());
                
                card.innerHTML = `
                    <h3>${art.name}</h3>
                    <p style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 1rem;">${art.realName}</p>
                    ${art.fake === 'None - Always real' ? 
                        `<div class="comparison"><span class="real">✓ Always Authentic</span><br>This artwork has no fake version.</div>` :
                        `
                        <div class="comparison">
                            <span class="real">✓ Real:</span> ${art.real || 'See description'}
                        </div>
                        <div class="comparison">
                            <span class="fake">✗ Fake:</span> ${art.fake}
                        </div>
                        `
                    }
                `;
                grid.appendChild(card);
            });
        }

        function filterArt() {
            const query = document.getElementById('search').value.toLowerCase();
            const cards = document.querySelectorAll('.art-card');
            
            cards.forEach(card => {
                const name = card.getAttribute('data-name');
                card.style.display = name.includes(query) ? 'block' : 'none';
            });
        }

        render();
    </script>
