    <style>
        .canvas-container {
            background: var(--panel-strong);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            padding: 1rem;
            margin: 1.5rem 0;
        }
        #drawing-canvas {
            width: 100%;
            background: #fff;
            border-radius: 8px;
            cursor: crosshair;
            touch-action: none;
        }
        .toolbar {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            align-items: center;
            margin-bottom: 1rem;
            padding: 1rem;
            background: var(--panel-strong);
            border-radius: 12px;
        }
        .color-palette {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .color-btn {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            border: 2px solid var(--border-color);
            cursor: pointer;
            transition: transform 0.2s;
        }
        .color-btn:hover {
            transform: scale(1.1);
        }
        .color-btn.active {
            border-color: var(--accent-color);
            border-width: 3px;
        }
        .brush-sizes {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }
        .brush-size {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            border: 2px solid var(--border-color);
            background: var(--panel-color);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .brush-size:hover {
            background: var(--panel-strong);
        }
        .brush-size.active {
            background: var(--accent-color);
            border-color: var(--accent-color);
            color: white;
        }
        .size-indicator {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: var(--text-color);
        }
        .btn-row {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            margin-top: 1rem;
        }
    </style>

<body>
    <header class="header">
        <div class="container navbar">
            <a href="../../" class="logo">Drawing<span>Board</span></a>
            <nav class="nav-links" aria-label="Primary navigation">
                <a href="../../#tools">Tools</a>
                <a href="../../#reviews">Reviews</a>
                <a href="../../#games">Games</a>
                <a href="../../about/">About</a>
            </nav>
        </div>
    </header>

    <main class="container main-content">
        <section class="calculator-card">
            <div class="card-header">
                <h1>🎨 Online Drawing Board</h1>
                <p>Create sketches and doodles with ease. Choose colors, adjust brush size, and save your artwork.</p>
            </div>

            <div class="toolbar">
                <div>
                    <label style="margin-bottom: 0.5rem; display: block; font-weight: 600;">Colors</label>
                    <div class="color-palette">
                        <div class="color-btn active" style="background: #000000;" data-color="#000000"></div>
                        <div class="color-btn" style="background: #FF0000;" data-color="#FF0000"></div>
                        <div class="color-btn" style="background: #00FF00;" data-color="#00FF00"></div>
                        <div class="color-btn" style="background: #0000FF;" data-color="#0000FF"></div>
                        <div class="color-btn" style="background: #FFFF00;" data-color="#FFFF00"></div>
                        <div class="color-btn" style="background: #FF00FF;" data-color="#FF00FF"></div>
                        <div class="color-btn" style="background: #00FFFF;" data-color="#00FFFF"></div>
                        <div class="color-btn" style="background: #FFA500;" data-color="#FFA500"></div>
                        <div class="color-btn" style="background: #A020F0;" data-color="#A020F0"></div>
                        <div class="color-btn" style="background: #FFC0CB;" data-color="#FFC0CB"></div>
                    </div>
                </div>

                <div>
                    <label style="margin-bottom: 0.5rem; display: block; font-weight: 600;">Brush Size</label>
                    <div class="brush-sizes">
                        <div class="brush-size" data-size="2"><div class="size-indicator" style="width: 4px; height: 4px;"></div></div>
                        <div class="brush-size active" data-size="5"><div class="size-indicator" style="width: 8px; height: 8px;"></div></div>
                        <div class="brush-size" data-size="10"><div class="size-indicator" style="width: 12px; height: 12px;"></div></div>
                        <div class="brush-size" data-size="20"><div class="size-indicator" style="width: 18px; height: 18px;"></div></div>
                    </div>
                </div>
            </div>

            <div class="canvas-container">
                <canvas id="drawing-canvas" width="800" height="500"></canvas>
            </div>

            <div class="btn-row">
                <button class="btn btn-secondary" onclick="clearCanvas()">🗑️ Clear</button>
                <button class="btn btn-primary" onclick="saveDrawing()">💾 Save as PNG</button>
                <button class="btn btn-secondary" onclick="eraserMode()">✏️ Eraser</button>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container text-center">
            <nav class="footer-links" aria-label="Footer navigation">

                <a href="../../disclaimer/">Disclaimer</a>
            </nav>
            <p>&copy; 2026 NeonStack. Browser-first tools and focused guides.</p>
        </div>
    </footer>

    <script>
        const canvas = document.getElementById('drawing-canvas');
        const ctx = canvas.getContext('2d');
        let isDrawing = false;
        let currentColor = '#000000';
        let brushSize = 5;

        function resizeCanvas() {
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        function startDrawing(e) {
            isDrawing = true;
            draw(e);
        }

        function stopDrawing() {
            isDrawing = false;
            ctx.beginPath();
        }

        function draw(e) {
            if (!isDrawing) return;
            
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX || e.touches[0].clientX) - rect.left;
            const y = (e.clientY || e.touches[0].clientY) - rect.top;

            ctx.lineWidth = brushSize;
            ctx.lineCap = 'round';
            ctx.strokeStyle = currentColor;

            ctx.lineTo(x, y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x, y);
        }

        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('mouseout', stopDrawing);

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            startDrawing(e);
        });
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            draw(e);
        });
        canvas.addEventListener('touchend', stopDrawing);

        document.querySelectorAll('.color-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentColor = this.dataset.color;
            });
        });

        document.querySelectorAll('.brush-size').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.brush-size').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                brushSize = parseInt(this.dataset.size);
            });
        });

        function clearCanvas() {
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function saveDrawing() {
            const link = document.createElement('a');
            link.download = 'drawing-' + Date.now() + '.png';
            link.href = canvas.toDataURL();
            link.click();
        }

        function eraserMode() {
            currentColor = '#ffffff';
            document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
        }
    </script>
</body>
