<body>
    <header class="header">
        <div class="container navbar">
            <a href="../../" class="logo">QR<span>Gen</span></a>
            <nav class="nav-links" aria-label="Primary navigation">
                <a href="../../#tools">Tools</a>
                <a href="../../#reviews">Reviews</a>

            </nav>
        </div>
    </header>

    <main class="container main-content">
        <section class="calculator-card">
            <div class="card-header">
                <h1>📱 QR Code Generator</h1>
                <p>Create QR codes for URLs, text, WiFi passwords, and more. Download as PNG instantly.</p>
            </div>

            <div class="calc-grid">
                <div class="inputs-panel">
                    <div class="input-group">
                        <label for="qr-text">Content (URL or Text)</label>
                        <textarea id="qr-text" placeholder="https://example.com">https://github.com</textarea>
                    </div>
                    
                    <div class="input-group">
                        <label>QR Code Size</label>
                        <div class="size-selector">
                            <button class="size-btn" onclick="setSize(200, this)">Small</button>
                            <button class="size-btn active" onclick="setSize(300, this)">Medium</button>
                            <button class="size-btn" onclick="setSize(500, this)">Large</button>
                        </div>
                    </div>

                    <button class="btn btn-primary" onclick="generateQR()">⚡ Generate QR</button>
                    <button class="btn btn-secondary" onclick="downloadQR()">⬇️ Download PNG</button>
                </div>

                <div class="qr-preview">
                    <canvas id="qr-canvas"></canvas>
                </div>
            </div>
        </section>

        </div>

    <script>
        let currentSize = 300;
        const qrText = document.getElementById('qr-text');
        const canvas = document.getElementById('qr-canvas');
        const ctx = canvas.getContext('2d');

        function setSize(size, button) {
            currentSize = size;
            document.querySelectorAll('.size-btn').forEach(btn => btn.classList.remove('active'));
            button.classList.add('active');
            generateQR();
        }

        function generateQR() {
            const text = qrText.value || 'https://example.com';

            canvas.width = currentSize;
            canvas.height = currentSize;

            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, currentSize, currentSize);

            if (typeof qrcode !== 'function') {
                ctx.fillStyle = '#111111';
                ctx.font = '16px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('QR library failed to load', currentSize / 2, currentSize / 2);
                return;
            }

            const qr = qrcode(0, 'M');
            qr.addData(text);
            qr.make();

            const count = qr.getModuleCount();
            const quietZone = 4;
            const moduleSize = Math.floor(currentSize / (count + quietZone * 2));
            const qrSize = moduleSize * count;
            const offset = Math.floor((currentSize - qrSize) / 2);

            ctx.fillStyle = '#000000';

            for (let row = 0; row < count; row++) {
                for (let col = 0; col < count; col++) {
                    if (qr.isDark(row, col)) {
                        ctx.fillRect(
                            offset + col * moduleSize,
                            offset + row * moduleSize,
                            moduleSize,
                            moduleSize
                        );
                    }
                }
            }
        }

        function downloadQR() {
            const link = document.createElement('a');
            link.download = 'qrcode.png';
            link.href = canvas.toDataURL();
            link.click();
        }

        generateQR();
    </script>
