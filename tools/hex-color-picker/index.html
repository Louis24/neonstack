<head>
    <meta charset="UTF-8">

    <title>HEX Color Picker | Visual Color Selector with Presets</title>
    <meta name="description" content="Choose colors visually or from popular presets. Click to copy HEX code instantly.">
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <style>
        .color-preview-large {
            width: 100%;
            height: 300px;
            border-radius: 16px;
            border: 3px solid var(--border-color);
            margin: 1.5rem 0;
            transition: background 0.3s;
            cursor: pointer;
            position: relative;
        }
        .color-code-display {
            position: absolute;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 1rem 2rem;
            border-radius: 10px;
            font-family: 'Courier New', monospace;
            font-size: 1.5rem;
            font-weight: 700;
            cursor: pointer;
        }
        .native-picker {
            width: 100%;
            height: 60px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin: 1rem 0;
        }
        .preset-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
            gap: 0.75rem;
            margin: 1.5rem 0;
        }
        .preset-color {
            aspect-ratio: 1;
            border-radius: 10px;
            cursor: pointer;
            border: 2px solid var(--border-color);
            transition: transform 0.2s;
        }
        .preset-color:hover {
            transform: scale(1.1);
            border-color: white;
        }
    </style>
    <link rel="canonical" href="https://neonstack.net/tools/hex-color-picker/">

<body>
    <header class="header">
        <div class="container navbar">
            <a href="../../" class="logo">Color<span>Pick</span></a>
            <nav class="nav-links" aria-label="Primary navigation">
                <a href="../../#tools">Tools</a>
                <a href="../../#reviews">Reviews</a>
                <a href="../../#games">Games</a>
                <a href="../../about/">About</a>
            </nav>
        </div>
    </header>

    <main class="container main-content">
        <section class="calculator-card">
            <div class="card-header">
                <h1>🎨 Color Picker</h1>
                <p>Choose colors visually or from popular presets. Click to copy HEX code instantly.</p>
            </div>

            <div class="color-preview-large" id="color-preview" onclick="copyColor()">
                <div class="color-code-display" id="color-code">#6366F1</div>
            </div>

            <input type="color" id="color-input" class="native-picker" value="#6366F1">

            <h3 style="margin: 2rem 0 1rem;">Popular Color Presets</h3>
            <div class="preset-grid" id="preset-grid"></div>
        </section>
    </main>

    <footer class="footer">
        <div class="container text-center">
            <nav class="footer-links" aria-label="Footer navigation">
                <a href="../../about/">About</a>
                <a href="../../contact/">Contact</a>

                <a href="../../disclaimer/">Disclaimer</a>
            </nav>
            <p>&copy; 2026 NeonStack. Browser-first tools and focused guides.</p>
        </div>
    </footer>

    <script>
        const presetColors = [
            '#ef4444', '#f97316', '#f59e0b', '#eab308', '#84cc16', '#22c55e',
            '#10b981', '#14b8a6', '#06b6d4', '#0ea5e9', '#3b82f6', '#6366f1',
            '#8b5cf6', '#a855f7', '#d946ef', '#ec4899', '#f43f5e', '#ffffff',
            '#f3f4f6', '#d1d5db', '#9ca3af', '#6b7280', '#4b5563', '#374151',
            '#1f2937', '#111827', '#000000'
        ];

        const colorInput = document.getElementById('color-input');
        const colorPreview = document.getElementById('color-preview');
        const colorCode = document.getElementById('color-code');
        const presetGrid = document.getElementById('preset-grid');

        presetColors.forEach(color => {
            const preset = document.createElement('div');
            preset.className = 'preset-color';
            preset.style.background = color;
            preset.onclick = () => setColor(color);
            presetGrid.appendChild(preset);
        });

        function setColor(color) {
            colorInput.value = color;
            updateColor(color);
        }

        function updateColor(color) {
            colorPreview.style.background = color;
            colorCode.textContent = color.toUpperCase();
        }

        function copyColor() {
            const color = colorCode.textContent;
            navigator.clipboard.writeText(color).then(() => {
                colorCode.textContent = '✅ Copied!';
                setTimeout(() => colorCode.textContent = color, 1500);
            });
        }

        colorInput.addEventListener('input', (e) => {
            updateColor(e.target.value);
        });

        updateColor('#6366F1');
    </script>
