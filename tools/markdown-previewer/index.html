    <script>
        const mdInput = document.getElementById('md-input');
        const mdPreview = document.getElementById('md-preview');

        const sampleMd = `# Welcome to Markdown

## What is Markdown?

Markdown is a **lightweight markup language** with plain text formatting syntax. It's designed to be easy to write and read.

### Features

- **Bold** and *italic* text
- [Links](https://example.com)
- \`inline code\`
- Lists and more!

\`\`\`javascript
console.log('Hello, World!');
\`\`\`

> Blockquotes for emphasis

Start editing on the left to see changes here!`;

        mdInput.value = sampleMd;

        function escapeHtml(value) {
            return value
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function safeUrl(value) {
            try {
                const url = new URL(value, window.location.href);
                return ['http:', 'https:', 'mailto:'].includes(url.protocol) ? url.href : '#';
            } catch (err) {
                return '#';
            }
        }

        function parseMarkdown(md) {
            let html = escapeHtml(md)
                // Headers
                .replace(/^### (.*$)/gim, '<h3>$1</h3>')
                .replace(/^## (.*$)/gim, '<h2>$1</h2>')
                .replace(/^# (.*$)/gim, '<h1>$1</h1>')
                // Bold
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                // Italic
                .replace(/\*(.*?)\*/g, '<em>$1</em>')
                // Links
                .replace(/\[([^\]]+)\]\(([^)]+)\)/g, (_match, text, url) => {
                    return `<a href="${safeUrl(url)}" rel="nofollow noopener">${text}</a>`;
                })
                // Code blocks
                .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
                // Inline code
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                // Blockquotes
                .replace(/^> (.*$)/gim, '<blockquote>$1</blockquote>')
                // Unordered lists
                .replace(/^\- (.*$)/gim, '<li>$1</li>')
                // Line breaks
                .replace(/\n\n/g, '</p><p>')
                .replace(/\n/g, '<br>');

            // Wrap in paragraphs
            html = '<p>' + html + '</p>';

            // Wrap lists
            html = html.replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>');

            return html;
        }

        function updatePreview() {
            const markdown = mdInput.value;
            mdPreview.innerHTML = parseMarkdown(markdown);
        }

        function copyHTML() {
            const html = mdPreview.innerHTML;
            navigator.clipboard.writeText(html).then(() => {
                alert('HTML copied to clipboard!');
            });
        }

        mdInput.addEventListener('input', updatePreview);
        updatePreview();
    </script>
