<body>

    <main class="container main-content">
        <section class="calculator-card">
            <div class="card-header">
                <h1>🔍 Regex Pattern Tester</h1>
                <p>Test regular expressions in real-time. See matches highlighted instantly as you type.</p>
            </div>

            <div class="regex-input">
                <label style="font-size: 0.7rem; color: var(--text-muted); display: block; margin-bottom: 0.5rem;">REGULAR EXPRESSION</label>
                <input type="text" id="regex-pattern" placeholder="Enter regex pattern..." value="\b[A-Z][a-z]+\b">
                <div class="flags">
                    <label><input type="checkbox" id="flag-g" checked> g (global)</label>
                    <label><input type="checkbox" id="flag-i"> i (case insensitive)</label>
                    <label><input type="checkbox" id="flag-m"> m (multiline)</label>
                </div>
            </div>

            <div class="input-group">
                <label for="test-text">Test String</label>
                <textarea id="test-text" class="test-text" placeholder="Enter text to test against...">The Quick Brown Fox jumps over the lazy dog. This is a Test String with Various words.</textarea>
            </div>

            <div class="match-result" id="match-result">
                <!-- Results will appear here -->
            </div>

            <div class="match-info" id="match-info" style="display: none;">
                <strong>Match Information:</strong><br>
                <span id="match-count">0 matches found</span>
            </div>
        </section>

    <script>
        const regexInput = document.getElementById('regex-pattern');
        const testText = document.getElementById('test-text');
        const matchResult = document.getElementById('match-result');
        const matchInfo = document.getElementById('match-info');
        const matchCount = document.getElementById('match-count');

        function escapeHtml(value) {
            return value
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function testRegex() {
            const pattern = regexInput.value;
            const text = testText.value;
            
            if (!pattern) {
                matchResult.textContent = 'Enter a regex pattern to test.';
                matchInfo.style.display = 'none';
                return;
            }

            try {
                let flags = '';
                if (document.getElementById('flag-g').checked) flags += 'g';
                if (document.getElementById('flag-i').checked) flags += 'i';
                if (document.getElementById('flag-m').checked) flags += 'm';

                const regex = new RegExp(pattern, flags);
                const matches = [...text.matchAll(new RegExp(pattern, flags + (flags.includes('g') ? '' : 'g')))];
                
                if (matches.length === 0) {
                    matchResult.textContent = 'No matches found.';
                    matchCount.textContent = '0 matches found';
                } else {
                    let highlightedText = text;
                    const sortedMatches = matches.sort((a, b) => b.index - a.index);
                    
                    sortedMatches.forEach(match => {
                        const matchText = match[0];
                        const start = match.index;
                        const end = start + matchText.length;
                        highlightedText = highlightedText.slice(0, start) +
                            `\u0000${matchText}\u0000` +
                            highlightedText.slice(end);
                    });

                    matchResult.innerHTML = escapeHtml(highlightedText)
                        .replace(/\u0000([\s\S]*?)\u0000/g, '<span class="highlight">$1</span>');
                    matchCount.textContent = `${matches.length} match${matches.length !== 1 ? 'es' : ''} found`;
                }
                
                matchInfo.style.display = 'block';
            } catch (e) {
                matchResult.textContent = `Error: ${e.message}`;
                matchInfo.style.display = 'none';
            }
        }

        regexInput.addEventListener('input', testRegex);
        testText.addEventListener('input', testRegex);
        document.querySelectorAll('input[type="checkbox"]').forEach(cb => {
            cb.addEventListener('change', testRegex);
        });

        testRegex();
    </script>
