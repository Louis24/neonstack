            'Gestures': ['ΏθΣΜ','Ώθνγ','ΏθΨΡ','έεΜ','ΏθΨΨ','ΏθΣΝ','ΏθνΝ','ΏθνΠ','έεΝ','Ώθνη','Ώθνθ','Ώθνα','Ώθνβ','ΏθΣΙ','ΏθΣΚ','ΏθΣΗ','ΏθΨΧ','ΏθΣΘ','έαζ','ΏθΣΞ','ΏθΣΟ','έεΛ','ΏθΣΛ','Ώθνδ','Ώθνε','ΏθΣΠ','ΏθβΝ','ΏθΣΡ','Ώθν▓','Ώθνζ','ΏθβΠ'],
            'People': ['ΏθΣ╢','ΏθΣπ','ΏθπΤ','ΏθΣο','ΏθΣσ','ΏθπΣ','ΏθΣρ','ΏθΣσέΑΞΏθο▒','ΏθπΣέΑΞΏθο▒','ΏθΣρέΑΞΏθο▒','ΏθΣσέΑΞΏθο░','ΏθπΣέΑΞΏθο░','ΏθΣρέΑΞΏθο░','ΏθΣ▒έΑΞέβΑΎ╕Π','ΏθΣ▒','ΏθΣ▒έΑΞέβΓΎ╕Π','ΏθΣσέΑΞΏθο│','ΏθπΣέΑΞΏθο│','ΏθΣρέΑΞΏθο│','ΏθΣσέΑΞΏθο▓','ΏθπΣέΑΞΏθο▓','ΏθΣρέΑΞΏθο▓','ΏθπΦ','ΏθΣ╡','ΏθπΥ','ΏθΣ┤','ΏθΣ▓'],
            'Animals': ['ΏθΡ╢','ΏθΡ▒','ΏθΡφ','ΏθΡ╣','ΏθΡ░','ΏθοΛ','ΏθΡ╗','ΏθΡ╝','ΏθΡρ','ΏθΡψ','ΏθοΒ','ΏθΡχ','ΏθΡ╖','ΏθΡ╕','ΏθΡ╡','ΏθΡΦ','ΏθΡπ','ΏθΡο','ΏθΡν','ΏθοΗ','ΏθοΖ','ΏθοΚ','ΏθοΘ','ΏθΡ║','ΏθΡΩ','ΏθΡ┤','ΏθοΕ','ΏθΡζ','ΏθΡδ','ΏθοΜ','ΏθΡΝ','ΏθΡη'],
            'Food': ['ΏθΞΟ','ΏθΞΛ','ΏθΞΜ','ΏθΞΝ','ΏθΞΚ','ΏθΞΘ','ΏθΞΥ','ΏθτΡ','ΏθΞΙ','ΏθΞΤ','ΏθΞΣ','Ώθξφ','ΏθΞΞ','Ώθξξ','Ώθξζ','ΏθΞΖ','ΏθΞΗ','ΏθξΣ','Ώθξο','Ώθξυ','ΏθξΤ','ΏθΝ╢','ΏθτΣ','ΏθΝ╜','ΏθξΧ','ΏθτΤ','ΏθπΕ','ΏθπΖ','ΏθξΦ','ΏθΞι','ΏθξΡ','Ώθξψ','ΏθΞη','ΏθξΨ','Ώθξρ','ΏθπΑ'],
            'Travel': ['ΏθγΩ','ΏθγΧ','Ώθγβ','ΏθγΝ','ΏθγΟ','ΏθΠΟ','ΏθγΥ','ΏθγΣ','ΏθγΤ','ΏθγΡ','Ώθδ╗','Ώθγγ','Ώθγδ','Ώθγε','Ώθοψ','Ώθο╜','Ώθο╝','Ώθδ┤','Ώθγ▓','Ώθδ╡','ΏθΠΞ','Ώθδ║','ΏθγΦ','ΏθγΞ','Ώθγα','ΏθγΨ','Ώθγκ','Ώθγι','Ώθγθ','ΏθγΔ','ΏθγΜ','Ώθγη','Ώθγζ','έεΙΎ╕Π','Ώθδτ','Ώθδυ'],
            'Objects': ['έΝγ','ΏθΥ▒','ΏθΥ▓','ΏθΤ╗','έΝρΎ╕Π','ΏθΨξ','ΏθΨρ','ΏθΨ▒','ΏθΨ▓','ΏθΧ╣','ΏθΩε','ΏθΤ╛','ΏθΤ┐','ΏθΥΑ','ΏθΥ╝','ΏθΥ╖','ΏθΥ╕','ΏθΥ╣','ΏθΟξ','ΏθΥ╜','ΏθΟη','ΏθΥη','έαΟΎ╕Π','ΏθΥθ','ΏθΥι','ΏθΥ║','ΏθΥ╗','ΏθΟβ','ΏθΟγ','ΏθΟδ','Ώθπφ','έΠ▒','έΠ▓','έΠ░','ΏθΧ░','έΠ│','έΝδ'],
            'Symbols': ['έζνΎ╕Π','Ώθπκ','ΏθΤδ','ΏθΤγ','ΏθΤβ','ΏθΤε','ΏθΨν','ΏθνΞ','ΏθνΟ','ΏθΤΦ','έζμΎ╕Π','ΏθΤΧ','ΏθΤη','ΏθΤΥ','ΏθΤΩ','ΏθΤΨ','ΏθΤα','ΏθΤζ','ΏθΤθ','έαχΎ╕Π','έεζΎ╕Π','έαςΎ╕Π','ΏθΧΚ','έα╕Ύ╕Π','έεκΎ╕Π','ΏθΦψ','ΏθΧΟ','έαψΎ╕Π','έαοΎ╕Π','ΏθδΡ','έδΟ','έβΙ','έβΚ','έβΛ','έβΜ','έβΝ','έβΞ']
        };

        const categoryTabs = document.getElementById('category-tabs');
        const emojiGrid = document.getElementById('emoji-grid');
        const searchInput = document.getElementById('search-input');
        const toast = document.getElementById('toast');

        let currentCategory = 'Smileys';

        Object.keys(emojiData).forEach(category => {
            const btn = document.createElement('button');
            btn.className = 'tab-btn' + (category === currentCategory ? ' active' : '');
            btn.textContent = category;
            btn.onclick = () => showCategory(category);
            categoryTabs.appendChild(btn);
        });

        function showCategory(category) {
            currentCategory = category;
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.toggle('active', btn.textContent === category);
            });
            renderEmojis(emojiData[category]);
        }

        function renderEmojis(emojis) {
            emojiGrid.innerHTML = '';
            emojis.forEach(emoji => {
                const item = document.createElement('div');
                item.className = 'emoji-item';
                item.textContent = emoji;
                item.onclick = () => copyEmoji(emoji);
                emojiGrid.appendChild(item);
            });
        }

        function copyEmoji(emoji) {
            navigator.clipboard.writeText(emoji).then(() => {
                toast.textContent = `έεΖ ${emoji} copied!`;
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 2000);
            });
        }

        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            if (!query) {
                showCategory(currentCategory);
                return;
            }
            
            const allEmojis = Object.values(emojiData).flat();
            renderEmojis(allEmojis);
        });

        showCategory('Smileys');
    </script>
