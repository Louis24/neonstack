    <link rel="preconnect" href="https://fonts.googleapis.com">

    <style>
        .search-box {
            margin: 1.5rem 0;
        }
        .search-box input {
            width: 100%;
            padding: 1rem;
            font-size: 1rem;
        }
        .category-tabs {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin: 1.5rem 0;
        }
        .tab-btn {
            padding: 0.5rem 1rem;
            border: 1px solid var(--border-color);
            background: var(--panel-strong);
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }
        .tab-btn:hover, .tab-btn.active {
            background: var(--accent-color);
            color: #000;
            border-color: var(--accent-color);
        }
        .emoji-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
            gap: 0.5rem;
            margin: 1.5rem 0;
        }
        .emoji-item {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            background: var(--panel-strong);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .emoji-item:hover {
            transform: scale(1.1);
            border-color: var(--accent-color);
            background: rgba(16,185,129,0.1);
        }
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--accent-color);
            color: #000;
            padding: 1rem 1.5rem;
            border-radius: 8px;
            font-weight: 700;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .toast.show { opacity: 1; }
    </style>
    <link rel="canonical" href="https://neonstack.net/tools/emoji-picker/">
    <script type="application/ld+json" data-generated-seo>
    {
      "@context": "https://schema.org",
      "@graph": [

          "isPartOf": {
            "@type": "WebSite",

          "itemListElement": [
            {
              "@type": "ListItem",
              "position": 1,

              "item": "https://neonstack.net/"
            },
            {
              "@type": "ListItem",
              "position": 2,
              "name": "Tools",
              "item": "https://neonstack.net/tools/"
            },
            {
              "@type": "ListItem",
              "position": 3,
              "name": "Emoji Picker",
              "item": "https://neonstack.net/tools/emoji-picker/"
            }

</head>
<body>
    <header class="header">
        <div class="container navbar">
            <a href="../../" class="logo">Emoji<span>Pick</span></a>
            <nav class="nav-links" aria-label="Primary navigation">
                <a href="../../#tools">Tools</a>
                <a href="../../#reviews">Reviews</a>
                <a href="../../#games">Games</a>
                <a href="../../about/">About</a>
            </nav>
        </div>
    </header>

    <main class="container main-content">
        <section class="calculator-card">
            <div class="card-header">
                <h1>😀 Emoji Picker</h1>
                <p>Browse, search, and copy emojis with one click. Organized by category for quick access.</p>
            </div>

            <div class="search-box">
                <input type="text" id="search-input" placeholder="🔍 Search emojis...">
            </div>

            <div class="category-tabs" id="category-tabs"></div>
            <div class="emoji-grid" id="emoji-grid"></div>
        </section>
    </main>

    <div class="toast" id="toast">✅ Emoji copied!</div>

    <footer class="footer">
        <div class="container text-center">
            <nav class="footer-links" aria-label="Footer navigation">
                <a href="../../about/">About</a>
                <a href="../../contact/">Contact</a>
                <a href="../../privacy-policy/">Privacy Policy</a>
                <a href="../../disclaimer/">Disclaimer</a>
            </nav>
            <p>&copy; 2026 NeonStack. Browser-first tools and focused guides.</p>
        </div>
    </footer>

    <script>
        const emojiData = {
            'Smileys': ['😀','😃','😄','😁','😅','😂','🤣','😊','😇','🙂','🙃','😉','😌','😍','🥰','😘','😗','😙','😚','😋','😛','😝','😜','🤪','🤨','🧐','🤓','😎','🤩','🥳'],
            'Gestures': ['👋','🤚','🖐','✋','🖖','👌','🤌','🤏','✌','🤞','🤟','🤘','🤙','👈','👉','👆','🖕','👇','☝','👍','👎','✊','👊','🤛','🤜','👏','🙌','👐','🤲','🤝','🙏'],
            'People': ['👶','👧','🧒','👦','👩','🧑','👨','👩‍🦱','🧑‍🦱','👨‍🦱','👩‍🦰','🧑‍🦰','👨‍🦰','👱‍♀️','👱','👱‍♂️','👩‍🦳','🧑‍🦳','👨‍🦳','👩‍🦲','🧑‍🦲','👨‍🦲','🧔','👵','🧓','👴','👲'],
            'Animals': ['🐶','🐱','🐭','🐹','🐰','🦊','🐻','🐼','🐨','🐯','🦁','🐮','🐷','🐸','🐵','🐔','🐧','🐦','🐤','🦆','🦅','🦉','🦇','🐺','🐗','🐴','🦄','🐝','🐛','🦋','🐌','🐞'],
            'Food': ['🍎','🍊','🍋','🍌','🍉','🍇','🍓','🫐','🍈','🍒','🍑','🥭','🍍','🥥','🥝','🍅','🍆','🥑','🥦','🥬','🥒','🌶','🫑','🌽','🥕','🫒','🧄','🧅','🥔','🍠','🥐','🥯','🍞','🥖','🥨','🧀'],
            'Travel': ['🚗','🚕','🚙','🚌','🚎','🏎','🚓','🚑','🚒','🚐','🛻','🚚','🚛','🚜','🦯','🦽','🦼','🛴','🚲','🛵','🏍','🛺','🚔','🚍','🚘','🚖','🚡','🚠','🚟','🚃','🚋','🚞','🚝','✈️','🛫','🛬'],
            'Objects': ['⌚','📱','📲','💻','⌨️','🖥','🖨','🖱','🖲','🕹','🗜','💾','💿','📀','📼','📷','📸','📹','🎥','📽','🎞','📞','☎️','📟','📠','📺','📻','🎙','🎚','🎛','🧭','⏱','⏲','⏰','🕰','⏳','⌛'],
            'Symbols': ['❤️','🧡','💛','💚','💙','💜','🖤','🤍','🤎','💔','❣️','💕','💞','💓','💗','💖','💘','💝','💟','☮️','✝️','☪️','🕉','☸️','✡️','🔯','🕎','☯️','☦️','🛐','⛎','♈','♉','♊','♋','♌','♍']
        };

        const categoryTabs = document.getElementById('category-tabs');
        const emojiGrid = document.getElementById('emoji-grid');
        const searchInput = document.getElementById('search-input');
        const toast = document.getElementById('toast');

        let currentCategory = 'Smileys';

        Object.keys(emojiData).forEach(category => {
            const btn = document.createElement('button');
            btn.className = 'tab-btn' + (category === currentCategory ? ' active' : '');
            btn.textContent = category;
            btn.onclick = () => showCategory(category);
            categoryTabs.appendChild(btn);
        });

        function showCategory(category) {
            currentCategory = category;
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.toggle('active', btn.textContent === category);
            });
            renderEmojis(emojiData[category]);
        }

        function renderEmojis(emojis) {
            emojiGrid.innerHTML = '';
            emojis.forEach(emoji => {
                const item = document.createElement('div');
                item.className = 'emoji-item';
                item.textContent = emoji;
                item.onclick = () => copyEmoji(emoji);
                emojiGrid.appendChild(item);
            });
        }

        function copyEmoji(emoji) {
            navigator.clipboard.writeText(emoji).then(() => {
                toast.textContent = `✅ ${emoji} copied!`;
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 2000);
            });
        }

        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            if (!query) {
                showCategory(currentCategory);
                return;
            }
            
            const allEmojis = Object.values(emojiData).flat();
            renderEmojis(allEmojis);
        });

        showCategory('Smileys');
    </script>
</body>
</html>
