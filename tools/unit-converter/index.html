        }

<body>
    <header class="header">
        <div class="container navbar">
            <a href="../../" class="logo">Unit<span>Convert</span></a>

    <main class="container main-content">
        <section class="calculator-card">
            <div class="card-header">
                <h1>🔄 Unit Converter</h1>
                <p>Convert between different units of measurement quickly and accurately.</p>
            </div>

            <div class="category-pills" id="category-pills"></div>

            <div class="converter-row">
                <div class="input-group">
                    <label for="from-value">From</label>
                    <input type="number" id="from-value" value="1" step="any">
                    <select id="from-unit" style="margin-top: 0.5rem;"></select>
                </div>

                <button class="swap-btn" onclick="swapUnits()">⇄</button>

                <div class="input-group">
                    <label for="to-value">To</label>
                    <input type="number" id="to-value" readonly>
                    <select id="to-unit" style="margin-top: 0.5rem;"></select>
                </div>
            </div>
        </section>
    </main>

        </div>

    <script>
        const conversions = {
            'Length': {
                'meter': 1,
                'kilometer': 0.001,
                'centimeter': 100,
                'millimeter': 1000,
                'mile': 0.000621371,
                'yard': 1.09361,
                'foot': 3.28084,
                'inch': 39.3701
            },
            'Weight': {
                'kilogram': 1,
                'gram': 1000,
                'milligram': 1000000,
                'pound': 2.20462,
                'ounce': 35.274,
                'ton': 0.001
            },
            'Temperature': {
                'celsius': { to: (v, u) => u === 'fahrenheit' ? v * 9/5 + 32 : u === 'kelvin' ? v + 273.15 : v },
                'fahrenheit': { to: (v, u) => u === 'celsius' ? (v - 32) * 5/9 : u === 'kelvin' ? (v - 32) * 5/9 + 273.15 : v },
                'kelvin': { to: (v, u) => u === 'celsius' ? v - 273.15 : u === 'fahrenheit' ? (v - 273.15) * 9/5 + 32 : v }
            },
            'Volume': {
                'liter': 1,
                'milliliter': 1000,
                'gallon': 0.264172,
                'quart': 1.05669,
                'pint': 2.11338,
                'cup': 4.22675,
                'fluid ounce': 33.814
            }
        };

        let currentCategory = 'Length';
        const categoryPills = document.getElementById('category-pills');
        const fromValue = document.getElementById('from-value');
        const toValue = document.getElementById('to-value');
        const fromUnit = document.getElementById('from-unit');
        const toUnit = document.getElementById('to-unit');

        Object.keys(conversions).forEach(category => {
            const pill = document.createElement('button');
            pill.className = 'pill' + (category === currentCategory ? ' active' : '');
            pill.textContent = category;
            pill.onclick = () => setCategory(category);
            categoryPills.appendChild(pill);
        });

        function setCategory(category) {
            currentCategory = category;
            document.querySelectorAll('.pill').forEach(p => {
                p.classList.toggle('active', p.textContent === category);
            });
            
            const units = Object.keys(conversions[category]);
            fromUnit.innerHTML = '';
            toUnit.innerHTML = '';
            
            units.forEach(unit => {
                fromUnit.add(new Option(unit, unit));
                toUnit.add(new Option(unit, unit));
            });
            
            if (units.length > 1) toUnit.value = units[1];
            convert();
        }

        function convert() {
            const value = parseFloat(fromValue.value) || 0;
            const from = fromUnit.value;
            const to = toUnit.value;
            const category = conversions[currentCategory];

            let result;
            if (currentCategory === 'Temperature') {
                result = category[from].to(value, to);
            } else {
                const inBase = value / category[from];
                result = inBase * category[to];
            }

            toValue.value = result.toFixed(6).replace(/\.?0+$/, '');
        }

        function swapUnits() {
            const temp = fromUnit.value;
            fromUnit.value = toUnit.value;
            toUnit.value = temp;
            convert();
        }

        fromValue.addEventListener('input', convert);
        fromUnit.addEventListener('change', convert);
        toUnit.addEventListener('change', convert);

        setCategory('Length');
    </script>
