            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin: 1rem 0;
        }
        @media (max-width: 680px) { .base64-layout { grid-template-columns: 1fr; } }
        .pane-label {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-muted);
            padding: 0.5rem 0;
        }
        textarea {
            min-height: 300px;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
        }
        .toolbar {
            display: flex;
            gap: 0.6rem;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }
    </style>
    <link rel="canonical" href="https://neonstack.net/tools/base64-tool/">
    <script type="application/ld+json" data-generated-seo>

          "itemListElement": [

              "name": "Tools",

            },

              "@type": "ListItem",
              "position": 3,

              "item": "https://neonstack.net/tools/base64-tool/"

          ]
        }

    }
    </script>
</head>
<body>
    <header class="header">
        <div class="container navbar">
            <a href="../../" class="logo">Base<span>64</span></a>
            <nav class="nav-links" aria-label="Primary navigation">
                <a href="../../#tools">Tools</a>
                <a href="../../#reviews">Reviews</a>
                <a href="../../#games">Games</a>
                <a href="../../about/">About</a>
            </nav>
        </div>
    </header>

    <main class="container main-content">
        <section class="calculator-card">
            <div class="card-header">
                <h1>🔐 Base64 Encoder / Decoder</h1>
                <p>Convert text or small images to/from Base64 format. All processing happens in your browser.</p>
            </div>

            <div class="toolbar">
                <button class="btn btn-primary" onclick="encode()">🔒 Encode</button>
                <button class="btn btn-primary" onclick="decode()">🔓 Decode</button>
                <button class="btn btn-secondary" onclick="clearAll()">🗑 Clear</button>
                <button class="btn btn-secondary" onclick="copyOutput()">📋 Copy Output</button>
            </div>

            <div class="base64-layout">
                <div>
                    <div class="pane-label">✏️ Input (Plain Text)</div>
                    <textarea id="input-text" placeholder="Enter text to encode or Base64 to decode...">Hello, Base64!</textarea>
                </div>
                <div>
                    <div class="pane-label">🔑 Output (Base64)</div>
                    <textarea id="output-text" readonly placeholder="Encoded/decoded text will appear here..."></textarea>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container text-center">
            <nav class="footer-links" aria-label="Footer navigation">
                <a href="../../about/">About</a>
                <a href="../../contact/">Contact</a>
                <a href="../../privacy-policy/">Privacy Policy</a>
                <a href="../../disclaimer/">Disclaimer</a>
            </nav>
            <p>&copy; 2026 NeonStack. Browser-first tools and focused guides.</p>
        </div>
    </footer>

    <script>
        const inputText = document.getElementById('input-text');
        const outputText = document.getElementById('output-text');

        function encode() {
            try {
                const encoded = btoa(inputText.value);
                outputText.value = encoded;
            } catch (e) {
                outputText.value = 'Error: ' + e.message;
            }
        }

        function decode() {
            try {
                const decoded = atob(inputText.value);
                outputText.value = decoded;
            } catch (e) {
                outputText.value = 'Error: Invalid Base64 string';
            }
        }

        function clearAll() {
            inputText.value = '';
            outputText.value = '';
        }

        function copyOutput() {
            navigator.clipboard.writeText(outputText.value);
        }

        encode();
    </script>
</body>
</html>
