    <script>
        const codeSnippets = [
            'import { <span class="code-function">hackerMode</span> } from "<span class="code-string">@elite/cybersecurity</span>";',
            '<span class="code-comment">// Accessing mainframe...</span>',
            '<span class="code-keyword">const</span> connection = <span class="code-keyword">await</span> <span class="code-function">establishSecureConnection</span>();',
            '<span class="code-keyword">if</span> (connection.status === "<span class="code-string">connected</span>") {',
            '  <span class="code-function">initializeEncryption</span>(<span class="code-string">256</span>);',
            '  <span class="code-keyword">const</span> data = <span class="code-keyword">await</span> <span class="code-function">fetchSecretData</span>();',
            '  <span class="code-comment">// Decrypting payload...</span>',
            '  <span class="code-keyword">return</span> <span class="code-function">decrypt</span>(data, <span class="code-string">"AES-256-GCM"</span>);',
            '}',
            '',
            '<span class="code-comment">// System Analysis: 98% complete</span>',
            '<span class="code-keyword">class</span> <span class="code-function">NeuralNetwork</span> {',
            '  <span class="code-function">constructor</span>(layers, neurons) {',
            '    <span class="code-keyword">this</span>.layers = layers;',
            '    <span class="code-keyword">this</span>.neurons = neurons;',
            '    <span class="code-keyword">this</span>.weights = <span class="code-function">initializeWeights</span>();',
            '  }',
            '}',
            '',
            '<span class="code-comment">// [CLASSIFIED] Accessing database cluster...</span>',
            '<span class="code-keyword">const</span> query = `<span class="code-string">SELECT * FROM users WHERE access_level > 9000</span>`;',
            'database.<span class="code-function">execute</span>(query).<span class="code-function">then</span>(results => {',
            '  console.<span class="code-function">log</span>(`<span class="code-string">Found ${results.length} elite users</span>`);',
            '});'
        ];

        let isRunning = false;
        let isPaused = false;
        let currentIndex = 0;
        let intervalId;

        const themes = {
            matrix: { color: '#00ff41', bg: '#0a0e27' },
            cyberpunk: { color: '#bd93f9', bg: '#1a0d2e' },
            amber: { color: '#ffb000', bg: '#1a1200' },
            blue: { color: '#00d4ff', bg: '#001a2e' }
        };

        function changeTheme() {
            const theme = document.getElementById('theme-select').value;
            const terminal = document.getElementById('terminal');
            terminal.style.color = themes[theme].color;
            terminal.style.background = themes[theme].bg;
        }

        function startCoding() {
            document.body.classList.add('fullscreen-mode');
            isRunning = true;
            isPaused = false;
            currentIndex = 0;
            document.getElementById('code-output').innerHTML = '';
            runCoding();

            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen().catch(() => {});
            }
        }

        function runCoding() {
            if (!isRunning || isPaused) return;

            const speed = parseInt(document.getElementById('speed-slider').value);
            const output = document.getElementById('code-output');
            
            if (currentIndex < codeSnippets.length) {
                const line = document.createElement('div');
                line.className = 'code-line';
                line.innerHTML = codeSnippets[currentIndex];
                output.appendChild(line);
                currentIndex++;

                if (document.getElementById('sound-toggle').checked) {
                    playKeySound();
                }

                setTimeout(runCoding, 200 - speed);
            } else {
                currentIndex = 0;
                setTimeout(runCoding, 1000);
            }
        }

        function playKeySound() {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.value = 400 + Math.random() * 200;
            oscillator.type = 'square';
            
            gainNode.gain.setValueAtTime(0.05, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.05);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.05);
        }

        function exitFullscreen() {
            document.body.classList.remove('fullscreen-mode');
            isRunning = false;
            if (document.exitFullscreen) {
                document.exitFullscreen().catch(() => {});
            }
        }

        function togglePause() {
            isPaused = !isPaused;
            if (!isPaused) runCoding();
        }

        function clearScreen() {
            document.getElementById('code-output').innerHTML = '';
            currentIndex = 0;
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && document.body.classList.contains('fullscreen-mode')) {
                exitFullscreen();
            }
        });
    </script>
