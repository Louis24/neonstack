<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <title>Text to Speech | Free Online TTS Converter</title>
    <meta name="description" content="Convert any text to natural-sounding speech using your browser's built-in voices.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/site.css">
    <style>
        .voice-controls {
            background: var(--panel-strong);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            margin: 1.5rem 0;
        }
        .control-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        @media (max-width: 680px) {
            .control-row { grid-template-columns: 1fr; }
        }
        .play-btn {
            background: var(--info);
            border-color: var(--info);
            font-size: 1.1rem;
        }
        .speaking {
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
    </style>
    <link rel="canonical" href="https://neonstack.net/tools/text-to-speech/">
    <script type="application/ld+json" data-generated-seo>
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "WebPage",
          "@id": "https://neonstack.net/tools/text-to-speech/#webpage",
          "url": "https://neonstack.net/tools/text-to-speech/",
          "name": "Text To Speech",
          "description": "Convert any text to natural-sounding speech using your browser's built-in voices.",
          "isPartOf": {
            "@type": "WebSite",
            "@id": "https://neonstack.net/#website",
            "name": "NeonStack",
            "url": "https://neonstack.net/"
          }
        },
        {
          "@type": "BreadcrumbList",
          "itemListElement": [
            {
              "@type": "ListItem",
              "position": 1,
              "name": "Home",
              "item": "https://neonstack.net/"
            },
            {
              "@type": "ListItem",
              "position": 2,
              "name": "Tools",
              "item": "https://neonstack.net/tools/"
            },
            {
              "@type": "ListItem",
              "position": 3,
              "name": "Text To Speech",
              "item": "https://neonstack.net/tools/text-to-speech/"
            }
          ]
        }
      ]
    }
    </script>
</head>
<body>
    <header class="header">
        <div class="container navbar">
            <a href="../../" class="logo">Text<span>2Speech</span></a>
            <nav class="nav-links" aria-label="Primary navigation">
                <a href="../../#tools">Tools</a>
                <a href="../../#reviews">Reviews</a>
                <a href="../../#games">Games</a>
                <a href="../../about/">About</a>
            </nav>
        </div>
    </header>

    <main class="container main-content">
        <section class="calculator-card">
            <div class="card-header">
                <h1>🔊 Text to Speech</h1>
                <p>Convert any text to natural-sounding speech using your browser's built-in voices.</p>
            </div>

            <div class="input-group">
                <label for="text-input">Text to Read</label>
                <textarea id="text-input" placeholder="Enter text here...">Hello! Welcome to the text to speech converter. This tool uses your browser's speech synthesis to read text aloud.</textarea>
            </div>

            <div class="voice-controls">
                <div class="control-row">
                    <div class="input-group">
                        <label for="voice-select">Voice</label>
                        <select id="voice-select"></select>
                    </div>
                    <div class="input-group">
                        <label for="rate-input">Speed: <span id="rate-value">1.0x</span></label>
                        <input type="range" id="rate-input" min="0.5" max="2" step="0.1" value="1">
                    </div>
                </div>
                <div class="control-row">
                    <div class="input-group">
                        <label for="pitch-input">Pitch: <span id="pitch-value">1.0</span></label>
                        <input type="range" id="pitch-input" min="0.5" max="2" step="0.1" value="1">
                    </div>
                    <div class="input-group">
                        <label for="volume-input">Volume: <span id="volume-value">100%</span></label>
                        <input type="range" id="volume-input" min="0" max="1" step="0.1" value="1">
                    </div>
                </div>
            </div>

            <div style="display: flex; gap: 1rem; flex-wrap: wrap;">
                <button class="btn btn-primary play-btn" id="speak-btn" onclick="speak()">🔊 Speak</button>
                <button class="btn btn-secondary" onclick="pause()">⏸️ Pause</button>
                <button class="btn btn-secondary" onclick="resume()">▶️ Resume</button>
                <button class="btn btn-secondary" onclick="stop()">⏹️ Stop</button>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container text-center">
            <nav class="footer-links" aria-label="Footer navigation">
                <a href="../../about/">About</a>
                <a href="../../contact/">Contact</a>
                <a href="../../privacy-policy/">Privacy Policy</a>
                <a href="../../disclaimer/">Disclaimer</a>
            </nav>
            <p>&copy; 2026 NeonStack. Browser-first tools and focused guides.</p>
        </div>
    </footer>

    <script>
        const synth = window.speechSynthesis;
        const textInput = document.getElementById('text-input');
        const voiceSelect = document.getElementById('voice-select');
        const rateInput = document.getElementById('rate-input');
        const pitchInput = document.getElementById('pitch-input');
        const volumeInput = document.getElementById('volume-input');
        const speakBtn = document.getElementById('speak-btn');

        let voices = [];

        function loadVoices() {
            voices = synth.getVoices();
            voiceSelect.innerHTML = '';
            
            voices.forEach((voice, index) => {
                const option = document.createElement('option');
                option.value = index;
                option.textContent = `${voice.name} (${voice.lang})`;
                voiceSelect.appendChild(option);
            });
        }

        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = loadVoices;
        }
        loadVoices();

        function speak() {
            if (synth.speaking) {
                synth.cancel();
            }

            const text = textInput.value;
            if (!text) return;

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.voice = voices[voiceSelect.value];
            utterance.rate = parseFloat(rateInput.value);
            utterance.pitch = parseFloat(pitchInput.value);
            utterance.volume = parseFloat(volumeInput.value);

            utterance.onstart = () => speakBtn.classList.add('speaking');
            utterance.onend = () => speakBtn.classList.remove('speaking');

            synth.speak(utterance);
        }

        function pause() {
            if (synth.speaking) synth.pause();
        }

        function resume() {
            if (synth.paused) synth.resume();
        }

        function stop() {
            synth.cancel();
            speakBtn.classList.remove('speaking');
        }

        rateInput.addEventListener('input', (e) => {
            document.getElementById('rate-value').textContent = parseFloat(e.target.value).toFixed(1) + 'x';
        });

        pitchInput.addEventListener('input', (e) => {
            document.getElementById('pitch-value').textContent = parseFloat(e.target.value).toFixed(1);
        });

        volumeInput.addEventListener('input', (e) => {
            document.getElementById('volume-value').textContent = Math.round(parseFloat(e.target.value) * 100) + '%';
        });
    </script>
</body>
</html>
