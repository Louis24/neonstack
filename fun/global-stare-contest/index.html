<body>
    <header class="header">
        <div class="container navbar">
            <a href="../../" class="logo">Stare<span>Contest</span></a>
            <nav class="nav-links"><a href="../../#tools">Tools</a><a href="../../#reviews">Reviews</a><a href="../../#games">Games</a><a href="../../about/">About</a></nav>
        </div>
    </header>
    <main class="container main-content">
        <section class="calculator-card">
            <div class="card-header">
                <h1>👁️ Global Stare Contest</h1>
                <p>Don't move your mouse or touch the screen. How long can you last?</p>
            </div>
            <div class="timer-display" id="timer">00:00</div>
            <div style="text-align: center; margin: 2rem 0;">
                <button class="btn btn-primary" onclick="start()" id="start-btn" style="font-size: 1.2rem; padding: 1rem 2rem;">
                    🎯 Start Challenge
                </button>
            </div>
            <div class="leaderboard">
                <h3 style="margin-top: 0;">🏆 Today's Top Scores</h3>
                <div class="leader-item">
                    <div><span class="rank">#1</span> Anonymous</div>
                    <div style="font-weight: 700;">15:32</div>
                </div>
                <div class="leader-item">
                    <div><span class="rank">#2</span> StillMaster</div>
                    <div style="font-weight: 700;">12:18</div>
                </div>
                <div class="leader-item">

        </div>
    </footer>
    <script>
        let startTime, interval, running = false;
        
        function start() {
            if (running) return;
            running = true;
            startTime = Date.now();
            document.getElementById('start-btn').disabled = true;
            document.getElementById('start-btn').textContent = '⏸️ Challenge Active...';
            
            interval = setInterval(() => {
                const elapsed = Date.now() - startTime;
                const mins = Math.floor(elapsed / 60000);
                const secs = Math.floor((elapsed % 60000) / 1000);
                document.getElementById('timer').textContent = 
                    `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            }, 100);
            
            document.addEventListener('mousemove', end);
            document.addEventListener('touchstart', end);
            document.addEventListener('keydown', end);
        }
        
        function end() {
            if (!running) return;
            running = false;
            clearInterval(interval);
            document.removeEventListener('mousemove', end);
            document.removeEventListener('touchstart', end);
            document.removeEventListener('keydown', end);
            
            const elapsed = Date.now() - startTime;
            const mins = Math.floor(elapsed / 60000);
            const secs = Math.floor((elapsed % 60000) / 1000);
            
            alert(`🏁 Challenge Over!\nYou lasted: ${mins}m ${secs}s\n\nTip: Try holding your breath to stay even more still!`);
            
            document.getElementById('start-btn').disabled = false;
            document.getElementById('start-btn').textContent = '🎯 Start Challenge';
            document.getElementById('timer').textContent = '00:00';
        }
    </script>
