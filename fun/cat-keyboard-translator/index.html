<body>

    <main class="container main-content">
        <section class="calculator-card">
            <div class="card-header">
                <h1>🐱 Cat Keyboard Translator</h1>
                <p>Did your cat walk on your keyboard? Let's decode their message!</p>
            </div>
            <div class="cat-display">😺</div>
            <div class="input-group">
                <label>Cat's Keyboard Typing</label>
                <textarea id="cat-input" class="input" placeholder="Paste what your cat typed... e.g. jfkdlsajfkld" rows="4" oninput="translate()"></textarea>
            </div>
            <div class="translation-box" id="translation">
                <h3 style="margin-top: 0;">🐾 Translation</h3>
                <p id="message">Type something to see what your cat is trying to say...</p>
                <div id="moods"></div>
            </div>
            <div style="text-align: center;">
                <button class="btn btn-secondary" onclick="generateRandom()">🎲 Random Cat Message</button>

    <script>
        const messages = [
            "I demand food RIGHT NOW! 🍖",
            "Pet me... but only on MY terms 😼",
            "The red dot... WHERE IS IT?! 🔴",
            "I knocked something off the table for you 💕",
            "3 AM is the perfect time for zoomies! 🏃",
            "This box is now MY throne 📦",
            "I've been staring at this wall for hours... fascinating 🧱",
            "Your lap looks comfortable. Moving in. 😴",
            "I'm not fat, I'm FLUFFY! 🎈",
            "The void under the couch called to me 🕳️"
        ];
        
        const moods = [
            "Hungry", "Playful", "Sleepy", "Demanding", "Mysterious", 
            "Chaotic", "Loving", "Judgmental", "Curious", "Dramatic"
        ];
        
        function translate() {
            const input = document.getElementById('cat-input').value;
            if (!input.trim()) {
                document.getElementById('message').textContent = "Type something to see what your cat is trying to say...";
                document.getElementById('moods').innerHTML = '';
                return;
            }
            
            const randomMessage = messages[Math.floor(Math.random() * messages.length)];
            const randomMoods = [];
            for (let i = 0; i < 3; i++) {
                const mood = moods[Math.floor(Math.random() * moods.length)];
                if (!randomMoods.includes(mood)) randomMoods.push(mood);
            }
            
            document.getElementById('message').textContent = randomMessage;
            document.getElementById('moods').innerHTML = randomMoods.map(m => 
                `<span class="cat-mood">${m}</span>`
            ).join('');
            
            const catEmojis = ['😺', '😸', '😹', '😻', '😼', '😽', '🙀', '😿', '😾'];
            document.querySelector('.cat-display').textContent = catEmojis[Math.floor(Math.random() * catEmojis.length)];
        }
        
        function generateRandom() {
            const chars = 'asdfjklqwertyuiopzxcvbnm';
            let random = '';
            for (let i = 0; i < Math.floor(Math.random() * 30) + 10; i++) {
                random += chars[Math.floor(Math.random() * chars.length)];
            }
            document.getElementById('cat-input').value = random;
            translate();
        }
    </script>
