    <style>
        body.destroyed { background: #000; animation: shake 0.5s; }
        @keyframes shake { 0%, 100% { transform: translate(0, 0); } 25% { transform: translate(-10px, 10px); } 50% { transform: translate(10px, -10px); } 75% { transform: translate(-10px, -10px); } }

        .destroy-btn { width: 300px; height: 300px; border-radius: 50%; background: linear-gradient(135deg, #ff0000 0%, #8b0000 100%); border: 10px solid #fff; color: white; font-size: 3rem; font-weight: 900; cursor: pointer; transition: all 0.3s; box-shadow: 0 20px 60px rgba(255, 0, 0, 0.5); }
        .destroy-btn:hover { transform: scale(1.1); box-shadow: 0 30px 80px rgba(255, 0, 0, 0.7); }
        .destroy-btn:active { transform: scale(0.9); }
        .explosion { position: fixed; pointer-events: none; font-size: 4rem; animation: explode 1s forwards; }
        @keyframes explode { 0% { opacity: 1; transform: translate(0, 0) scale(1); } 100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(2); } }

        .stat-box { background: var(--panel-strong); padding: 1.5rem; border-radius: 12px; text-align: center; }

    <script>
        let count = 0;
        function destroy() {
            count++;
            document.getElementById('count').textContent = count;
            const stress = Math.max(0, 100 - count * 5);
            const relief = Math.min(100, count * 5);
            document.getElementById('stress').textContent = stress + '%';
            document.getElementById('relief').textContent = relief + '%';
            
            document.body.classList.add('destroyed');
            setTimeout(() => document.body.classList.remove('destroyed'), 500);
            
            const emojis = ['💥', '💣', '🔥', '⚡', '💀', '☢️'];
            for (let i = 0; i < 10; i++) {
                setTimeout(() => {
                    const exp = document.createElement('div');
                    exp.className = 'explosion';
                    exp.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                    exp.style.left = Math.random() * window.innerWidth + 'px';
                    exp.style.top = Math.random() * window.innerHeight + 'px';
                    exp.style.setProperty('--tx', (Math.random() - 0.5) * 200 + 'px');
                    exp.style.setProperty('--ty', (Math.random() - 0.5) * 200 + 'px');
                    document.body.appendChild(exp);
                    setTimeout(() => exp.remove(), 1000);
                }, i * 50);
            }
            
            playExplosion();
        }
        
        function playExplosion() {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const duration = 0.5;
            
            for (let i = 0; i < 3; i++) {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                
                osc.frequency.setValueAtTime(200 - i * 50, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(20, ctx.currentTime + duration);
                osc.type = 'sawtooth';
                
                gain.gain.setValueAtTime(0.3, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + duration);
                
                osc.start(ctx.currentTime + i * 0.05);
                osc.stop(ctx.currentTime + duration);
            }
        }
    </script>
