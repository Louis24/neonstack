    <script>
        let callTimeout;
        let ringtoneInterval;
        
        function scheduleCall() {
            const delay = parseInt(document.getElementById('delay').value) * 1000;
            const btn = document.getElementById('schedule-btn');
            btn.disabled = true;
            btn.textContent = `⏳ Call in ${delay/1000}s...`;
            
            callTimeout = setTimeout(() => {
                showIncomingCall();
                btn.disabled = false;
                btn.textContent = '⏰ Schedule Call';
            }, delay);
        }
        
        function showIncomingCall() {
            const name = document.getElementById('caller-name').value || 'Unknown';
            document.getElementById('display-name').textContent = name;
            document.getElementById('phone').style.display = 'block';
            document.querySelector('.incoming-call').classList.add('ringing');
            
            playRingtone();
        }
        
        function playRingtone() {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            ringtoneInterval = setInterval(() => {
                const notes = [659, 587, 523];
                notes.forEach((freq, i) => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    
                    osc.frequency.value = freq;
                    osc.type = 'sine';
                    gain.gain.setValueAtTime(0.2, ctx.currentTime + i * 0.15);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + i * 0.15 + 0.15);
                    
                    osc.start(ctx.currentTime + i * 0.15);
                    osc.stop(ctx.currentTime + i * 0.15 + 0.15);
                });
            }, 2000);
        }
        
        function answerCall() {
            clearInterval(ringtoneInterval);
            alert('Call answered! Now act busy and walk away 😉');
            endCall();
        }
        
        function endCall() {
            clearInterval(ringtoneInterval);
            document.getElementById('phone').style.display = 'none';
            document.querySelector('.incoming-call').classList.remove('ringing');
        }
    </script>
