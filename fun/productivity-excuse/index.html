                    <div id="excuseDisplay" class="result-box" style="display:none;">Click to generate</div>

    <script>
        const excuses = [
            "I'm waiting for the build to finish",
            "My code is compiling... it takes a while",
            "I'm debugging a critical production issue",
            "I'm reviewing the architecture documentation",
            "Waiting for stakeholder feedback",
            "Running comprehensive test suites",
            "The deployment pipeline is processing",
            "I'm analyzing performance metrics",
            "Attending a mandatory security training",
            "My IDE is indexing the codebase",
            "Waiting for Docker containers to start",
            "I'm resolving merge conflicts",
            "The CI/CD pipeline is running",
            "I need to finish this code review first",
            "I'm researching best practices",
            "My local environment is updating",
            "I'm attending a cross-team sync",
            "The database migration is in progress",
            "I'm documenting the new API endpoints"
        ];
        const generateBtn = document.getElementById('generateBtn');
        const copyBtn = document.getElementById('copyBtn');
        const excuseDisplay = document.getElementById('excuseDisplay');
        generateBtn.addEventListener('click', () => {
            const excuse = excuses[Math.floor(Math.random() * excuses.length)];
            excuseDisplay.textContent = excuse;
            excuseDisplay.style.display = 'flex';
            copyBtn.style.display = 'inline-block';
        });
        copyBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(excuseDisplay.textContent);
            copyBtn.textContent = '✅ Copied!';
            setTimeout(() => copyBtn.textContent = '📋 Copy Excuse', 2000);
        });
    </script>
