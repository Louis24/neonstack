    <main class="container main-content">
        <section class="calculator-card">

            <div style="text-align: center; margin: 2rem 0;">
                <button class="btn btn-primary" onclick="toggleAmplifier()" id="amp-btn" style="font-size: 1.2rem; padding: 1rem 2rem;">
                    🎙️ Start Amplifier
                </button>
            </div>
            <div class="input-group">
                <label>Volume Boost</label>
                <input type="range" id="gain" class="input" min="1" max="5" step="0.5" value="2" oninput="updateGain()">
                <span id="gain-val">2x</span>
            </div>
            <div class="input-group">
                <label>Echo Effects</label>
                <div class="effect-grid">
                    <div class="effect-btn active" onclick="setEffect('none')" id="eff-none">
                        <div style="font-size: 2rem;">🔊</div>
                        <div>Normal</div>
                    </div>
                    <div class="effect-btn" onclick="setEffect('echo')" id="eff-echo">
                        <div style="font-size: 2rem;">🔁</div>
                        <div>Echo</div>
                    </div>
                    <div class="effect-btn" onclick="setEffect('reverb')" id="eff-reverb">

                    </div>
                </div>
            </div>

    <script>
        let audioContext, microphone, gainNode, analyser, isActive = false;
        let currentEffect = 'none';
        
        async function toggleAmplifier() {
            if (!isActive) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    
                    microphone = audioContext.createMediaStreamSource(stream);
                    gainNode = audioContext.createGain();
                    analyser = audioContext.createAnalyser();
                    
                    gainNode.gain.value = parseFloat(document.getElementById('gain').value);
                    
                    microphone.connect(gainNode);
                    gainNode.connect(analyser);
                    analyser.connect(audioContext.destination);
                    
                    isActive = true;
                    document.getElementById('amp-btn').textContent = '⏸️ Stop Amplifier';
                    document.getElementById('visual').classList.add('active');
                    
                    visualize();
                } catch (err) {
                    alert('Microphone access denied. Please allow microphone permission.');
                }
            } else {
                if (audioContext) audioContext.close();
                isActive = false;
                document.getElementById('amp-btn').textContent = '🎙️ Start Amplifier';
                document.getElementById('visual').classList.remove('active');
                document.getElementById('volume').style.width = '0%';
            }
        }
        
        function visualize() {
            if (!isActive) return;
            
            const dataArray = new Uint8Array(analyser.frequencyBinCount);
            analyser.getByteFrequencyData(dataArray);
            
            const average = dataArray.reduce((a, b) => a + b) / dataArray.length;
            const percentage = Math.min(100, (average / 128) * 100);
            
            document.getElementById('volume').style.width = percentage + '%';
            
            requestAnimationFrame(visualize);
        }
        
        function updateGain() {
            const value = parseFloat(document.getElementById('gain').value);
            document.getElementById('gain-val').textContent = value + 'x';
            if (gainNode) gainNode.gain.value = value;
        }
        
        function setEffect(effect) {
            currentEffect = effect;
            document.querySelectorAll('.effect-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('eff-' + effect).classList.add('active');
            
            // Effect implementation would require more complex audio processing
            // This is a simplified version
        }
    </script>
