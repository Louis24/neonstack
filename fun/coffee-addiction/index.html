        .result { background: rgba(16, 185, 129, 0.05); border: 1px solid rgba(16, 185, 129, 0.18); padding: 25px; border-radius: 12px; margin-top: 20px; text-align: center; display: none; }

<body>
    <header class="header">
        <div class="container navbar">
            <a href="../../" class="logo">Coffee<span>Addiction</span></a>
            <nav class="nav-links"><a href="../../">Home</a></nav>
        </div>
    </header>
    <section class="hero">
        <div class="container text-center">
            <span class="badge">Caffeine Powered</span>
            <h1>Coffee Addiction Calculator</h1>
            <p class="subtitle">How addicted are you to coffee? Let's find out.</p>
        </div>
    </section>
    <section class="comparison-section">
        <div class="container">
            <div class="card">
                <div class="calculator">
                    <div class="input-group">
                        <label>Cups per day:</label>
                        <input type="number" id="cups" min="0" max="20" value="3">
                    </div>
                    <div class="input-group">
                        <label>Years drinking coffee:</label>
                        <input type="number" id="years" min="0" max="50" value="5">
                    </div>
                    <div class="input-group">
                        <label>Can you function without it? (1-10):</label>
                        <input type="number" id="dependency" min="1" max="10" value="5">
                    </div>
                    <button class="calc-btn" onclick="calculate()">☕ Calculate Addiction</button>
                    <div class="result" id="result">
                        <div class="result-emoji" id="emoji">☕</div>
                        <div class="result-text" id="level">Calculating...</div>
                        <p id="message">Your diagnosis...</p>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <footer class="footer">
        <div class="container text-center">
            <nav class="footer-links" aria-label="Footer navigation"><a href="../../about/">About</a><a href="../../contact/">Contact</a><a href="../../privacy-policy/">Privacy Policy</a><a href="../../disclaimer/">Disclaimer</a></nav>

        </div>
    </footer>
    <script>
        function calculate() {
            const cups = parseInt(document.getElementById('cups').value);
            const years = parseInt(document.getElementById('years').value);
            const dependency = parseInt(document.getElementById('dependency').value);
            const score = (cups * 10) + (years * 2) + (dependency * 5);
            const result = document.getElementById('result');
            const emoji = document.getElementById('emoji');
            const level = document.getElementById('level');
            const message = document.getElementById('message');
            if (score < 50) {
                emoji.textContent = '😊';
                level.textContent = 'Casual Sipper';
                message.textContent = 'You can take it or leave it. Impressive self-control!';
            } else if (score < 100) {
                emoji.textContent = '☕';
                level.textContent = 'Coffee Enthusiast';
                message.textContent = 'You enjoy coffee, but you\'re not dependent. Yet.';
            } else if (score < 150) {
                emoji.textContent = '🤪';
                level.textContent = 'Seriously Addicted';
                message.textContent = 'Coffee is basically running through your veins now.';
            } else {
                emoji.textContent = '⚡';
                level.textContent = 'Coffee IS Your Blood Type';
                message.textContent = 'You don\'t drink coffee. Coffee drinks you.';
            }
            result.style.display = 'block';
        }
    </script>
