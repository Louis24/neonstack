        .meter-bar { height: 40px; background: var(--panel-strong); border: 1px solid var(--border-color); border-radius: 20px; overflow: hidden; position: relative; }
        .meter-fill { height: 100%; background: linear-gradient(90deg, #ef4444, #f59e0b, #10b981); transition: width 0.5s; }

        </div>
    </section>
    <section class="comparison-section">
        <div class="container">
            <div class="card">
                <button class="check-btn" onclick="checkMotivation()">📊 Check Motivation</button>
                <div class="meter-container">
                    <div class="meter-value" id="value">0%</div>
                    <div class="meter-bar"><div class="meter-fill" id="fill"></div></div>

    <script>
        function checkMotivation() {
            const level = Math.floor(Math.random() * 100);
            document.getElementById('value').textContent = level + '%';
            document.getElementById('fill').style.width = level + '%';
            const messages = {
                high: ["You're unstoppable!", "Peak performance mode!", "Nothing can stop you!", "Champion energy!"],
                mid: ["Decent vibes", "You can do this", "Not bad, not great", "Mediocre motivation"],
                low: ["Maybe tomorrow?", "Netflix sounds better", "Take a nap first", "Coffee needed ASAP"]
            };
            const category = level > 70 ? 'high' : level > 40 ? 'mid' : 'low';
            document.getElementById('message').textContent = messages[category][Math.floor(Math.random() * messages[category].length)];
        }
    </script>
