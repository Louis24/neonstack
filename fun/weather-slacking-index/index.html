    <main class="container main-content">
        <section class="calculator-card">
            <div class="card-header">
                <h1>🌤️ Weather Slacking Index</h1>
                <p>Scientific analysis of today's slack-off potential!</p>
            </div>
            <div class="input-group">
                <label>Weather Type</label>
                <select class="input" id="weather" onchange="calculate()">
                    <option value="sunny">☀️ Sunny</option>
                    <option value="cloudy">☁️ Cloudy</option>
                    <option value="rainy">🌧️ Rainy</option>
                    <option value="snowy">❄️ Snowy</option>
                    <option value="stormy">⛈️ Stormy</option>
                </select>
            </div>
            <div class="input-group">
                <label>Temperature (°C)</label>
                <input type="number" id="temp" class="input" value="22" oninput="calculate()">
            </div>
            <div class="input-group">
                <label>Day of Week</label>
                <select class="input" id="day" onchange="calculate()">
                    <option value="1">Monday</option>
                    <option value="2">Tuesday</option>
                    <option value="3">Wednesday</option>
                    <option value="4">Thursday</option>
                    <option value="5" selected>Friday</option>
                    <option value="6">Saturday</option>
                    <option value="7">Sunday</option>
                </select>
            </div>
            <div class="weather-display">
                <div class="weather-icon" id="icon">☀️</div>
                <div>Slacking Index</div>

            </div>
            <div class="excuse-box">
                <h3 style="margin-top: 0;">💡 Suggested Excuse</h3>

    <script>
        const excuses = {
            sunny: "It's too beautiful outside to be stuck indoors. Mental health day needed!",
            rainy: "The weather is affecting my productivity. Better to work from home... or bed.",
            snowy: "Roads are too dangerous. Safety first!",
            stormy: "Internet might go out. Better stay home just in case.",
            cloudy: "The gloomy weather is affecting my mood. Need a personal day."
        };
        
        const icons = {
            sunny: '☀️', cloudy: '☁️', rainy: '🌧️', snowy: '❄️', stormy: '⛈️'
        };
        
        function calculate() {
            const weather = document.getElementById('weather').value;
            const temp = parseFloat(document.getElementById('temp').value);
            const day = parseInt(document.getElementById('day').value);
            
            let score = 0;
            
            // Weather bonus
            if (weather === 'sunny' && temp >= 20 && temp <= 28) score += 40;
            else if (weather === 'rainy') score += 30;
            else if (weather === 'snowy') score += 35;
            else if (weather === 'stormy') score += 45;
            else score += 20;
            
            // Temperature bonus
            if (temp >= 25 && temp <= 30) score += 20;
            else if (temp < 10 || temp > 35) score += 25;
            else score += 10;
            
            // Day of week bonus
            if (day === 5) score += 30; // Friday
            else if (day === 1) score += 25; // Monday
            else if (day === 6 || day === 7) score += 40; // Weekend
            else score += 15;
            
            score = Math.min(100, score);
            
            let verdict = '';
            if (score >= 80) verdict = 'HIGHLY RECOMMENDED 🎉';
            else if (score >= 60) verdict = 'WORTH CONSIDERING 🤔';
            else if (score >= 40) verdict = 'MAYBE LATER 😐';
            else verdict = 'BETTER GO TO WORK 😅';
            
            document.getElementById('icon').textContent = icons[weather];
            document.getElementById('score').textContent = score + '/100';
            document.getElementById('verdict').textContent = verdict;
            document.getElementById('excuse').textContent = excuses[weather];
        }
        
        calculate();
    </script>
