<body>
    <header>
        <h1>🏅 拖延症奥运会</h1>
        <p>拖延也是一门艺术</p>
    </header>

    <main class="container">
        <section class="card">
            <h2>🎯 拖延成就榜</h2>
            <div class="achievement-list">
                <div class="achievement">
                    <input type="checkbox" id="a1">
                    <label for="a1">🥉 青铜：把明天的事拖到后天</label>
                </div>
                <div class="achievement">
                    <input type="checkbox" id="a2">
                    <label for="a2">🥈 白银：DDL前一天才开始</label>
                </div>
                <div class="achievement">
                    <input type="checkbox" id="a3">
                    <label for="a3">🥇 黄金：DDL当天凌晨还在开始</label>
                </div>
                <div class="achievement">
                    <input type="checkbox" id="a4">
                    <label for="a4">💎 钻石：错过DDL后装作不知道</label>
                </div>
                <div class="achievement">
                    <input type="checkbox" id="a5">
                    <label for="a5">👑 王者：把任务拖到别人忘记</label>
                </div>
            </div>

            <div id="score" style="margin-top:30px; text-align:center; font-size:24px;"></div>
        </section>

        <section class="card">
            <h2>📖 拖延经典语录</h2>
            <ul class="tips-list">
                <li>"明天再说吧"</li>
                <li>"还有时间"</li>
                <li>"我先看会儿手机"</li>
                <li>"等我有灵感了再做"</li>
                <li>"这个不急"</li>
            </ul>
        </section>

        <section class="card">
            <h2>💡 拖延小技巧</h2>
            <div class="info-grid">
                <div class="info-item">
                    <h3>完美主义拖延法</h3>
                    <p>"条件还不够完美，不适合开始"</p>
                </div>
                <div class="info-item">
                    <h3>研究型拖延法</h3>
                    <p>"我需要先做更多研究"</p>
                </div>
                <div class="info-item">
                    <h3>多任务拖延法</h3>
                    <p>"我在做别的更重要的事"</p>
                </div>
                <div class="info-item">
                    <h3>情绪拖延法</h3>
                    <p>"今天心情不好，明天再说"</p>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>Pure Frontend Tool - No Backend Required</p>
    </footer>

    <script>
        const checkboxes = document.querySelectorAll('input[type="checkbox"]');
        const scoreDisplay = document.getElementById('score');

        checkboxes.forEach(cb => {
            cb.addEventListener('change', updateScore);
        });

        function updateScore() {
            const checked = Array.from(checkboxes).filter(cb => cb.checked).length;
            const total = checkboxes.length;
            
            let message = '';
            if (checked === 0) message = '还没开始拖延之旅';
            else if (checked <= 2) message = `初级拖延者 (${checked}/${total})`;
            else if (checked <= 4) message = `专业拖延选手 (${checked}/${total})`;
            else message = `🏆 拖延大师！(${checked}/${total})`;

            scoreDisplay.textContent = message;
        }

        updateScore();
    </script>
</body>
