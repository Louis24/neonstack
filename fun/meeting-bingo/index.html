<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>会议Bingo - Meeting Bingo Game</title>
    <meta name="description" content="Meeting Bingo on NeonStack.">
    <link rel="stylesheet" href="../../assets/site.css">
    <style>
        .bingo-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            max-width: 600px;
            margin: 20px auto;
        }
        .bingo-cell {
            aspect-ratio: 1;
            border: 2px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            cursor: pointer;
            background: white;
            transition: all 0.3s;
            font-size: 14px;
            text-align: center;
        }
        .bingo-cell.clicked {
            background: #4CAF50;
            color: white;
        }
        .bingo-cell:hover {
            transform: scale(1.05);
        }
    </style>
    <link rel="canonical" href="https://neonstack.net/fun/meeting-bingo/">
    <script type="application/ld+json" data-generated-seo>
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "WebPage",
          "@id": "https://neonstack.net/fun/meeting-bingo/#webpage",
          "url": "https://neonstack.net/fun/meeting-bingo/",
          "name": "Meeting Bingo",
          "description": "Meeting Bingo on NeonStack.",
          "isPartOf": {
            "@type": "WebSite",
            "@id": "https://neonstack.net/#website",
            "name": "NeonStack",
            "url": "https://neonstack.net/"
          }
        },
        {
          "@type": "BreadcrumbList",
          "itemListElement": [
            {
              "@type": "ListItem",
              "position": 1,
              "name": "Home",
              "item": "https://neonstack.net/"
            },
            {
              "@type": "ListItem",
              "position": 2,
              "name": "Fun",
              "item": "https://neonstack.net/fun/"
            },
            {
              "@type": "ListItem",
              "position": 3,
              "name": "Meeting Bingo",
              "item": "https://neonstack.net/fun/meeting-bingo/"
            }
          ]
        }
      ]
    }
    </script>
</head>
<body>
    <header>
        <h1>🎯 会议Bingo</h1>
        <p>听到关键词就点一下，连成一线就赢了！</p>
    </header>

    <main class="container">
        <section class="card">
            <div id="bingoGrid" class="bingo-grid"></div>
            <button id="resetBtn" class="secondary-btn">重新开始</button>
            <div id="result" style="margin-top:20px; font-size:20px; text-align:center;"></div>
        </section>
    </main>

    <footer>
        <p>Pure Frontend Tool - No Backend Required</p>
    </footer>

    <script>
        const phrases = [
            "赋能", "抓手", "闭环", "生态",
            "打通", "落地", "对齐", "沉淀",
            "链路", "颗粒度", "抽象", "痛点",
            "打法", "心智", "杠杆", "矩阵",
            "破圈", "触达", "增量", "漏斗"
        ];

        function shuffle(array) {
            return array.sort(() => Math.random() - 0.5);
        }

        function createBingoGrid() {
            const grid = document.getElementById('bingoGrid');
            grid.innerHTML = '';
            const shuffled = shuffle([...phrases]).slice(0, 9);
            
            shuffled.forEach((phrase, index) => {
                const cell = document.createElement('div');
                cell.className = 'bingo-cell';
                cell.textContent = phrase;
                cell.dataset.index = index;
                cell.addEventListener('click', () => toggleCell(cell));
                grid.appendChild(cell);
            });
        }

        function toggleCell(cell) {
            cell.classList.toggle('clicked');
            checkBingo();
        }

        function checkBingo() {
            const cells = document.querySelectorAll('.bingo-cell');
            const clicked = Array.from(cells).map(c => c.classList.contains('clicked'));
            
            const lines = [
                [0,1,2], [3,4,5], [6,7,8], // 横
                [0,3,6], [1,4,7], [2,5,8], // 竖
                [0,4,8], [2,4,6] // 斜
            ];

            const hasWon = lines.some(line => 
                line.every(i => clicked[i])
            );

            const result = document.getElementById('result');
            if (hasWon) {
                result.textContent = '🎉 Bingo! 会议结束啦！';
                result.style.color = '#4CAF50';
            } else {
                result.textContent = '';
            }
        }

        document.getElementById('resetBtn').addEventListener('click', createBingoGrid);
        createBingoGrid();
    </script>
</body>
</html>
