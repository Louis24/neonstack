    <header class="header">

    <section class="comparison-section">

            <div class="card">
                <div class="text-center">
                    <button class="reset-btn" onclick="resetBoard()">🎲 New Game</button>
                </div>
                <div class="bingo-grid" id="bingoBoard"></div>
            </div>

    <script>
        const phrases = ["Synergy", "Leverage", "Pivot", "Circle Back", "Low-Hanging Fruit", "Move the Needle", "Bandwidth", "Touch Base", "Deep Dive", "Paradigm Shift", "Think Outside the Box", "Win-Win", "Best Practices", "Core Competency", "Going Forward", "Take Offline", "Actionable", "Stakeholder", "Deliverable", "Value-Add", "Drill Down", "Run it up the Flagpole", "Boil the Ocean", "Ping Me"];
        function shuffle(array) { for (let i = array.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [array[i], array[j]] = [array[j], array[i]]; } return array; }
        function createBoard() {
            const board = document.getElementById('bingoBoard');
            board.innerHTML = '';
            const selected = shuffle([...phrases]).slice(0, 16);
            selected.forEach((phrase, idx) => {
                const cell = document.createElement('div');
                cell.className = 'bingo-cell';
                cell.textContent = phrase;
                cell.onclick = () => cell.classList.toggle('marked');
                board.appendChild(cell);
            });
        }
        function resetBoard() { createBoard(); }
        createBoard();
    </script>
