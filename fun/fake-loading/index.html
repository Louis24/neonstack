        </div>
    </section>

    <section class="comparison-section">
        <div class="container">
            <div class="card">
                <div class="loading-container">
                    <div class="percentage" id="percent">0%</div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressBar"></div>
                    </div>
                    <div class="status" id="status">Initializing...</div>
                </div>

    <script>
        let progress = 0;
        const percent = document.getElementById('percent');
        const progressBar = document.getElementById('progressBar');
        const status = document.getElementById('status');

        const statuses = [
            'Initializing system...',
            'Loading dependencies...',
            'Compiling resources...',
            'Establishing connection...',
            'Processing data...',
            'Almost there...',
            'Final touches...',
            'Just a moment...'
        ];

        function updateProgress() {
            if (progress < 99) {
                // Fast at first, then slow down
                const increment = progress < 50 ? Math.random() * 3 :
                                  progress < 80 ? Math.random() * 1 :
                                  Math.random() * 0.2;
                progress = Math.min(99, progress + increment);

                percent.textContent = Math.floor(progress) + '%';
                progressBar.style.width = progress + '%';

                if (Math.random() < 0.3) {
                    status.textContent = statuses[Math.floor(Math.random() * statuses.length)];
                }

                const delay = progress < 80 ? 150 : 500;
                setTimeout(updateProgress, delay);
            } else {
                status.textContent = 'Finalizing... (This may take a while)';
            }
        }

        updateProgress();
    </script>
