<body>
    <header class="header">
        <div class="container navbar">
            <a href="../../" class="logo">Ex<span>Wall</span></a>

    <main class="container main-content">
        <section class="calculator-card">
            <div class="card-header">
                <h1>💔 Ex Anonymous Wall</h1>
                <p>Get it off your chest. 100% anonymous.</p>
            </div>
            <div class="input-group">
                <label>Your Message (Anonymous)</label>
                <textarea id="message" class="input" placeholder="Write what you need to say..." rows="4"></textarea>
            </div>
            <div style="text-align: center; margin: 2rem 0;">
                <button class="btn btn-primary" onclick="post()">📝 Post Anonymously</button>
            </div>
            <h3>Recent Posts</h3>
            <div class="wall" id="wall"></div>
        </section>

    <script>
        const samplePosts = [
            "You never deserved me anyway. Moving on!",
            "Why did you have to lie? Honesty was all I asked for.",
            "Thanks for wasting 3 years of my life.",
            "I hope you're happy now. I know I am.",
            "You taught me what I DON'T want in a relationship."
        ];
        
        let posts = [...samplePosts];
        
        function render() {
            document.getElementById('wall').innerHTML = posts.map((p, i) => `
                <div class="note">
                    <div class="note-text">${p}</div>
                    <div class="note-footer">
                        <span>Anonymous</span>
                        <span>${Math.floor(Math.random() * 24)}h ago</span>
                    </div>
                </div>
            `).join('');
        }
        
        function post() {
            const msg = document.getElementById('message').value.trim();
            if (!msg) {
                alert('Please write something!');
                return;
            }
            posts.unshift(msg);
            document.getElementById('message').value = '';
            render();
            alert('✅ Posted anonymously! Your message is now on the wall.');
        }
        
        render();
    </script>
