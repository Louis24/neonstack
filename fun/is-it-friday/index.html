        .answer.yes { color: #22c55e; animation: celebrate 1s infinite; }
        .answer.no { color: #ef4444; }
        @keyframes celebrate { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        .countdown { text-align: center; font-size: 2rem; color: var(--text-muted); margin-top: 2rem; }

<body>
    <header class="header">
        <div class="container navbar">
            <a href="../../" class="logo">Is It<span>Friday?</span></a>

    <main class="container main-content">
        <div class="answer" id="answer">NO</div>

    <footer class="footer">

    <script>
        function check() {
            const now = new Date();
            const day = now.getDay();
            const answer = document.getElementById('answer');
            const countdown = document.getElementById('countdown');
            
            if (day === 5) {
                answer.textContent = 'YES! 🎉';
                answer.className = 'answer yes';
                countdown.textContent = 'Happy Friday!';
            } else {
                answer.textContent = 'NO';
                answer.className = 'answer no';
                
                const daysUntil = (5 - day + 7) % 7 || 7;
                const hours = 24 - now.getHours();
                const mins = 60 - now.getMinutes();
                
                countdown.textContent = `${daysUntil} days, ${hours} hours, ${mins} minutes until Friday`;
            }
        }
        
        check();
        setInterval(check, 60000);
    </script>
