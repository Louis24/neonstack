<body>
    <header class="header">
        <div class="container navbar">
            <a href="../../" class="logo">Merit<span>Box</span></a>
            <nav class="nav-links"><a href="../../#tools">Tools</a><a href="../../#reviews">Reviews</a><a href="../../#games">Games</a><a href="../../about/">About</a></nav>
        </div>
    </header>
    <main class="container main-content">
        <section class="calculator-card">
            <div class="card-header">
                <h1>🪙 Digital Merit Box</h1>
                <p>Accumulate cyber merit through virtual offerings!</p>
            </div>
            <div class="merit-box">
                <div class="coin-display">💰</div>
                <div>Total Merit</div>
                <div class="merit-counter" id="merit">0</div>
                <div class="coin-buttons">
                    <div class="coin-btn" onclick="donate(1)">
                        <div style="font-size: 2rem;">🪙</div>
                        <div>+1</div>
                    </div>
                    <div class="coin-btn" onclick="donate(5)">
                        <div style="font-size: 2rem;">💵</div>
                        <div>+5</div>
                    </div>
                    <div class="coin-btn" onclick="donate(10)">
                        <div style="font-size: 2rem;">💎</div>
                        <div>+10</div>
                    </div>
                </div>
                <div class="blessing-text" id="blessing">Click to donate and receive blessings</div>
            </div>
            <div style="background: var(--panel-strong); padding: 2rem; border-radius: 12px; margin-top: 2rem;">
                <h3 style="margin-top: 0;">📊 Merit Statistics</h3>
                <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem;">
                    <div style="text-align: center;">
                        <div style="font-size: 2rem; font-weight: 800; color: var(--accent-color);" id="donations">0</div>
                        <div style="color: var(--text-muted);">Total Donations</div>
                    </div>
                    <div style="text-align: center;">
                        <div style="font-size: 2rem; font-weight: 800; color: var(--accent-color);" id="level">Novice</div>
                        <div style="color: var(--text-muted);">Merit Level</div>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <footer class="footer">
        <div class="container text-center">
            <nav class="footer-links"><a href="../../about/">About</a><a href="../../contact/">Contact</a><a href="../../privacy-policy/">Privacy</a><a href="../../disclaimer/">Disclaimer</a></nav>
            <p>&copy; 2026 NeonStack</p>
        </div>
    </footer>
    <script>
        let totalMerit = 0;
        let donationCount = 0;
        
        const blessings = [
            "May good fortune follow you! 🍀",
            "Your kindness will be rewarded! 🌟",
            "Prosperity is coming your way! 💫",
            "May peace be with you! ☮️",
            "Blessings upon your path! 🙏",
            "Your merit shines bright! ✨",
            "Good karma is accumulating! 🎋",
            "May happiness find you! 😊",
            "Fortune smiles upon you! 🌈",
            "Your spirit grows stronger! 💪"
        ];
        
        const levels = [
            {min: 0, name: 'Novice', emoji: '🌱'},
            {min: 50, name: 'Believer', emoji: '🕯️'},
            {min: 100, name: 'Devotee', emoji: '🙏'},
            {min: 200, name: 'Enlightened', emoji: '✨'},
            {min: 500, name: 'Master', emoji: '👑'},
            {min: 1000, name: 'Legend', emoji: '🌟'}
        ];
        
        function donate(amount) {
            totalMerit += amount;
            donationCount++;
            
            document.getElementById('merit').textContent = totalMerit;
            document.getElementById('donations').textContent = donationCount;
            
            const randomBlessing = blessings[Math.floor(Math.random() * blessings.length)];
            document.getElementById('blessing').textContent = randomBlessing;
            
            updateLevel();
            playCoinSound();
            showCoinAnimation();
        }
        
        function updateLevel() {
            const currentLevel = levels.reverse().find(l => totalMerit >= l.min) || levels[0];
            document.getElementById('level').textContent = currentLevel.emoji + ' ' + currentLevel.name;
            levels.reverse();
        }
        
        function playCoinSound() {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            
            osc.connect(gain);
            gain.connect(ctx.destination);
            
            osc.frequency.value = 800;
            osc.type = 'sine';
            gain.gain.setValueAtTime(0.3, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
            
            osc.start();
            osc.stop(ctx.currentTime + 0.1);
        }
        
        function showCoinAnimation() {
            const coin = document.querySelector('.coin-display');
            coin.style.animation = 'none';
            setTimeout(() => coin.style.animation = '', 10);
        }
    </script>
</body>
